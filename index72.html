<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="普通の文章を見やすい閲覧ページへ自動整形し、1つのHTMLとして保存できます。">
  <title>文章から閲覧用サイトを作成</title>
  <style>
    @layer base, layout, editor, viewer, responsive;

    @layer base {
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #1e293b;
        --muted: #64748b;
        --line: #dbe4f0;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --accent-soft: #eaf2ff;
        --danger: #b91c1c;
        --shadow: 0 18px 48px rgba(30, 41, 59, 0.10);
      }

      * { box-sizing: border-box; }
      html { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
      body { margin: 0; min-height: 100vh; background: linear-gradient(180deg, rgba(255,255,255,.78), transparent 340px), var(--bg); }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      a { color: var(--accent); overflow-wrap: anywhere; }
      .hidden { display: none !important; }
    }

    @layer layout {
      .app { width: min(920px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 52px; }
      .hero { margin-bottom: 18px; text-align: center; }
      .hero h1 { margin: 0; font-size: clamp(1.7rem, 4vw, 2.6rem); letter-spacing: -.04em; }
      .hero p { max-width: 740px; margin: 10px auto 0; color: var(--muted); line-height: 1.8; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
      .primary-button, .secondary-button { min-height: 48px; border: 0; border-radius: 14px; padding: 0 18px; font-weight: 800; }
      .primary-button { background: var(--accent); color: #fff; }
      .primary-button:hover { background: var(--accent-dark); }
      .secondary-button { background: var(--accent-soft); color: var(--accent-dark); }
    }

    @layer editor {
      .editor-panel { padding: 20px; }
      .field-label { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 8px; font-weight: 800; }
      .field-label small { color: var(--muted); font-weight: 500; }
      .title-input, .text-input { width: 100%; border: 1px solid var(--line); border-radius: 14px; background: #fff; color: var(--text); outline: none; }
      .title-input:focus, .text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37,99,235,.12); }
      .title-input { padding: 12px 14px; margin-bottom: 16px; }
      .text-input { min-height: 430px; padding: 16px; resize: vertical; line-height: 1.75; }
      .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
      .controls .primary-button { flex: 1 1 300px; }
      .helper { margin-top: 14px; padding: 14px 16px; border-radius: 14px; background: #f8fafc; color: var(--muted); line-height: 1.7; font-size: .94rem; }
      .status { min-height: 24px; margin-top: 12px; color: var(--muted); font-size: .93rem; }
      .status.error { color: var(--danger); }
    }

    @layer viewer {
      .document { position: relative; padding: clamp(24px, 5vw, 48px); }
      .viewer-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }
      .viewer-actions button { min-height: 42px; }
      .document h1 { margin: 0 110px 28px 0; font-size: clamp(1.8rem, 5vw, 2.8rem); line-height: 1.25; letter-spacing: -.035em; }
      .document h2 { margin: 34px 0 14px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-soft); font-size: clamp(1.2rem, 3vw, 1.55rem); line-height: 1.45; }
      .document p, .document li, .document blockquote { font-size: clamp(1rem, 2.2vw, 1.08rem); line-height: 1.9; }
      .document p { margin: 0 0 18px; }
      .document ul { margin: 0 0 22px; padding-left: 1.5em; }
      .document li + li { margin-top: 8px; }
      .document blockquote { margin: 20px 0; padding: 15px 18px; border-left: 5px solid var(--accent); border-radius: 0 12px 12px 0; background: var(--accent-soft); }
      .link-card { margin: 20px 0; }
      .link-card a { display: block; padding: 16px 18px; border: 1px solid #bfd2f5; border-radius: 14px; background: var(--accent-soft); text-decoration: none; font-weight: 700; }
      .meta { margin-top: 36px; padding-top: 18px; border-top: 1px solid var(--line); color: var(--muted); font-size: .86rem; }
    }

    @layer responsive {
      @media (max-width: 620px) {
        .app { width: min(100% - 16px, 920px); padding-top: 10px; }
        .editor-panel, .document { padding: 18px; border-radius: 18px; }
        .text-input { min-height: 55vh; }
        .controls { flex-direction: column; }
        .controls button { width: 100%; }
        .viewer-actions { position: static; justify-content: flex-end; margin: -4px 0 14px; }
        .document h1 { margin-right: 0; }
      }
    }
  </style>
</head>
<body>
  <main id="editorMode" class="app">
    <header class="hero">
      <h1>文章から閲覧用サイトを作成</h1>
      <p>普通に文章を入力して保存するだけで、同じHTMLが閲覧用ページとして開くようになります。</p>
    </header>

    <section class="panel editor-panel" aria-labelledby="editorTitle">
      <div class="field-label">
        <label for="pageTitle" id="editorTitle">ページタイトル</label>
        <small>空欄でも保存できます</small>
      </div>
      <input id="pageTitle" class="title-input" type="text" placeholder="例：旅行の予定、作業手順、参考資料">

      <div class="field-label">
        <label for="sourceText">文章</label>
        <small id="charCount">0文字</small>
      </div>
      <textarea id="sourceText" class="text-input" placeholder="ここに普通に文章を入力してください。"></textarea>

      <div class="controls">
        <button id="saveButton" class="primary-button" type="button">閲覧用サイトとして保存</button>
        <button id="saveEditorButton" class="secondary-button" type="button">保存</button>
        <button id="viewButton" class="secondary-button" type="button">この画面で閲覧</button>
        <button id="sampleButton" class="secondary-button" type="button">入力例を表示</button>
        <button id="clearButton" class="secondary-button" type="button">入力を消す</button>
      </div>

      <div class="helper">保存されたHTMLには入力内容が埋め込まれます。埋め込み内容が1文字以上あるHTMLは、次回から自動的に閲覧モードで開きます。</div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </main>

  <main id="viewerMode" class="app hidden">
    <article class="panel document">
      <div class="viewer-actions">
        <button id="copyNoteButton" class="secondary-button" type="button">note形式でのコピーに試みる</button>
        <button id="copyMarkdownButton" class="secondary-button" type="button">Markdownをコピー</button>
        <button id="editButton" class="secondary-button" type="button">編集する</button>
      </div>
      <h1 id="viewTitle"></h1>
      <div id="viewContent"></div>
      <footer id="viewMeta" class="meta"></footer>
    </article>
  </main>

  <script id="initialData" type="application/json">{"title":"","source":"","createdAt":"","startMode":"auto"}</script>
  <script>
  window.addEventListener("DOMContentLoaded", function () {
    "use strict";

    const editorMode = document.getElementById("editorMode");
    const viewerMode = document.getElementById("viewerMode");
    const titleInput = document.getElementById("pageTitle");
    const sourceText = document.getElementById("sourceText");
    const charCount = document.getElementById("charCount");
    const status = document.getElementById("status");
    const viewTitle = document.getElementById("viewTitle");
    const viewContent = document.getElementById("viewContent");
    const viewMeta = document.getElementById("viewMeta");

    const URL_ONLY_PATTERN = /^(https?:\/\/[^\s]+)$/i;
    const INLINE_URL_PATTERN = /(https?:\/\/[^\s<]+)/gi;
    const BULLET_PATTERN = /^\s*(?:[-*・●○■□]|\d+[.)]|[①-⑳])\s*(.+)$/;
    const POLITE_END_PATTERN = /(?:です|ます|でした|ました|ません|ください|でしょう|ましょう)[。！？!?]?$/;
    const SHORT_COMMA_PATTERN = /^(?!>\s*)([^、\n]{1,6})、/;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function safeUrl(value) {
      try {
        const url = new URL(value);
        return url.protocol === "http:" || url.protocol === "https:" ? url.href : "#";
      } catch (error) {
        return "#";
      }
    }

    function linkify(text) {
      const escaped = escapeHtml(text);
      return escaped.replace(INLINE_URL_PATTERN, function (matched) {
        const end = matched.match(/[.,、。!?！？)）\]】]+$/);
        const trailing = end ? end[0] : "";
        const raw = trailing ? matched.slice(0, -trailing.length) : matched;
        return '<a href="' + escapeHtml(safeUrl(raw)) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(raw) + "</a>" + escapeHtml(trailing);
      });
    }

    function getArticleStats(lines) {
      const nonEmpty = lines.filter(function (line) { return line.trim(); });
      const blankCount = lines.filter(function (line) { return !line.trim(); }).length;
      const doubleBreakHeavy = blankCount >= 3 && blankCount / Math.max(nonEmpty.length, 1) >= 0.35;
      const politeCount = nonEmpty.filter(function (line) { return POLITE_END_PATTERN.test(line.trim()); }).length;
      return { doubleBreakHeavy: doubleBreakHeavy, politeRatio: politeCount / Math.max(nonEmpty.length, 1) };
    }

    function splitBlocks(lines) {
      const blocks = [];
      let current = [];
      lines.forEach(function (line, index) {
        if (!line.trim()) {
          if (current.length) {
            blocks.push({ lines: current, start: index - current.length });
            current = [];
          }
        } else {
          current.push(line.trim());
        }
      });
      if (current.length) blocks.push({ lines: current, start: lines.length - current.length });
      return blocks;
    }

    function inferBulletLines(lines, stats) {
      const inferred = new Set();
      if (stats.politeRatio < 0.35) return inferred;

      splitBlocks(lines).forEach(function (block) {
        if (block.lines.length < 2) return;
        if (block.lines.some(function (line) { return URL_ONLY_PATTERN.test(line) || BULLET_PATTERN.test(line) || /^>\s+/.test(line); })) return;

        const politeInBlock = block.lines.filter(function (line) { return POLITE_END_PATTERN.test(line); }).length;
        const sentenceEndCount = block.lines.filter(function (line) { return /[。！？!?]$/.test(line); }).length;
        const shortEnough = block.lines.filter(function (line) { return line.length <= 45; }).length / block.lines.length >= 0.7;
        const looksList = politeInBlock === 0 && shortEnough && sentenceEndCount <= 1;
        if (!looksList) return;

        block.lines.forEach(function (line, offset) {
          const isLast = offset === block.lines.length - 1;
          if (isLast && /[、。]$/.test(line)) return;
          inferred.add(block.start + offset);
        });
      });
      return inferred;
    }

    function inferBlockHeadingLines(lines) {
      const inferred = new Set();

      splitBlocks(lines).forEach(function (block) {
        if (block.lines.length < 2) return;

        const first = block.lines[0].trim();
        const rest = block.lines.slice(1).map(function (line) { return line.trim(); }).filter(Boolean);
        if (!first || !rest.length) return;
        if (URL_ONLY_PATTERN.test(first) || BULLET_PATTERN.test(first) || /^>\s+/.test(first)) return;

        const averageLength = rest.reduce(function (total, line) {
          return total + line.length;
        }, 0) / rest.length;

        if (first.length <= averageLength / 2) inferred.add(block.start);
      });

      return inferred;
    }


    function getSingleLineBlockIndexes(lines) {
      const indexes = new Set();
      splitBlocks(lines).forEach(function (block) {
        if (block.lines.length === 1) indexes.add(block.start);
      });
      return indexes;
    }

    function inferQuoteLines(lines) {
      const targets = lines.map(function (line, index) {
        return SHORT_COMMA_PATTERN.test(line.trim()) ? index : -1;
      }).filter(function (index) { return index >= 0; });

      const quoted = new Set();
      for (let i = 0; i < targets.length;) {
        let j = i;
        while (j + 1 < targets.length && targets[j + 1] === targets[j] + 1) j++;
        const run = targets.slice(i, j + 1);
        if (run.length === 1) quoted.add(run[0]);
        else run.forEach(function (index, offset) { if ((offset + 1) % 2 === 0) quoted.add(index); });
        i = j + 1;
      }
      return quoted;
    }

    function looksLikeHeading(line, nextLine, previousBlank, stats) {
      const trimmed = line.trim();
      if (stats.doubleBreakHeavy || !trimmed || URL_ONLY_PATTERN.test(trimmed) || BULLET_PATTERN.test(trimmed) || /^>\s+/.test(trimmed)) return false;
      if (trimmed.length > 28 || /[、。！？.!?]$/.test(trimmed) || !previousBlank) return false;
      return Boolean(nextLine && nextLine.trim());
    }

    function parseTextToHtml(text) {
      const normalized = String(text).replace(/\r\n?/g, "\n").trim();
      if (!normalized) return "<p>文章が入力されていません。</p>";

      const lines = normalized.split("\n");
      const stats = getArticleStats(lines);
      const inferredBullets = inferBulletLines(lines, stats);
      const inferredQuotes = inferQuoteLines(lines);
      const inferredBlockHeadings = inferBlockHeadingLines(lines);
      const singleLineBlocks = getSingleLineBlockIndexes(lines);
      const blocks = [];
      let paragraph = [];
      let listItems = [];
      let quotes = [];

      function flushParagraph() {
        if (!paragraph.length) return;
        blocks.push("<p>" + paragraph.map(linkify).join("<br>") + "</p>");
        paragraph = [];
      }

      function flushList() {
        if (!listItems.length) return;
        blocks.push("<ul>" + listItems.map(function (item) { return "<li>" + linkify(item) + "</li>"; }).join("") + "</ul>");
        listItems = [];
      }

      function flushQuotes() {
        if (!quotes.length) return;
        blocks.push("<blockquote>" + quotes.map(linkify).join("<br>") + "</blockquote>");
        quotes = [];
      }

      lines.forEach(function (rawLine, index) {
        const trimmed = rawLine.trim();
        const nextLine = lines[index + 1] || "";
        const previousBlank = index === 0 || !lines[index - 1].trim();

        if (!trimmed) {
          flushParagraph(); flushList(); flushQuotes();
          return;
        }

        const urlOnly = trimmed.match(URL_ONLY_PATTERN);
        if (urlOnly) {
          flushParagraph(); flushList(); flushQuotes();
          blocks.push('<p class="link-card"><a href="' + escapeHtml(safeUrl(urlOnly[1])) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(urlOnly[1]) + "</a></p>");
          return;
        }

        const explicitQuote = trimmed.match(/^>\s*(.+)$/);
        if (explicitQuote || inferredQuotes.has(index)) {
          flushParagraph(); flushList();
          quotes.push(explicitQuote ? explicitQuote[1] : trimmed);
          return;
        }

        const bullet = trimmed.match(BULLET_PATTERN);
        if ((bullet || inferredBullets.has(index)) && singleLineBlocks.has(index)) {
          flushParagraph(); flushList(); flushQuotes();
          blocks.push("<h2>" + linkify(bullet ? bullet[1] : trimmed) + "</h2>");
          return;
        }
        if (bullet || inferredBullets.has(index)) {
          flushParagraph(); flushQuotes();
          listItems.push(bullet ? bullet[1] : trimmed);
          return;
        }

        if (inferredBlockHeadings.has(index) || looksLikeHeading(trimmed, nextLine, previousBlank, stats)) {
          flushParagraph(); flushList(); flushQuotes();
          blocks.push("<h2>" + linkify(trimmed) + "</h2>");
          return;
        }

        flushList(); flushQuotes();
        paragraph.push(trimmed);
      });

      flushParagraph(); flushList(); flushQuotes();
      return blocks.join("\n");
    }

    function parseTextToMarkdown(text) {
      const normalized = String(text).replace(/\r\n?/g, "\n").trim();
      if (!normalized) return "";

      const lines = normalized.split("\n");
      const stats = getArticleStats(lines);
      const inferredBullets = inferBulletLines(lines, stats);
      const inferredQuotes = inferQuoteLines(lines);
      const inferredBlockHeadings = inferBlockHeadingLines(lines);
      const singleLineBlocks = getSingleLineBlockIndexes(lines);
      const output = [];

      lines.forEach(function (rawLine, index) {
        const trimmed = rawLine.trim();
        const nextLine = lines[index + 1] || "";
        const previousBlank = index === 0 || !lines[index - 1].trim();

        if (!trimmed) {
          if (output.length && output[output.length - 1] !== "") output.push("");
          return;
        }

        const explicitQuote = trimmed.match(/^>\s*(.+)$/);
        if (explicitQuote || inferredQuotes.has(index)) {
          output.push("> " + (explicitQuote ? explicitQuote[1] : trimmed));
          return;
        }

        const bullet = trimmed.match(BULLET_PATTERN);
        if ((bullet || inferredBullets.has(index)) && singleLineBlocks.has(index)) {
          output.push("## " + (bullet ? bullet[1] : trimmed));
          return;
        }
        if (bullet || inferredBullets.has(index)) {
          output.push("- " + (bullet ? bullet[1] : trimmed));
          return;
        }

        if (inferredBlockHeadings.has(index) || looksLikeHeading(trimmed, nextLine, previousBlank, stats)) {
          output.push("## " + trimmed);
          return;
        }

        output.push(trimmed);
      });

      while (output.length && output[output.length - 1] === "") output.pop();
      return output.join("\n");
    }

    function encodeStoredText(value) {
      return String(value)
        .replace(/`/g, "jfasofklasflkd")
        .replace(/<\//g, "<gsafnasdfhags/");
    }

    function decodeStoredText(value) {
      return String(value)
        .replace(/<gsafnasdfhags\//g, "</")
        .replace(/jfasofklasflkd/g, String.fromCharCode(96));
    }

    function readInitialData() {
      try {
        const raw = decodeStoredText(document.getElementById("initialData").textContent || "");
        const parsed = JSON.parse(raw);
        return {
          title: typeof parsed.title === "string" ? parsed.title : "",
          source: typeof parsed.source === "string" ? parsed.source : "",
          createdAt: typeof parsed.createdAt === "string" ? parsed.createdAt : "",
          startMode: parsed.startMode === "editor" ? "editor" : "auto"
        };
      } catch (error) {
        return { title: "", source: "", createdAt: "", startMode: "auto" };
      }
    }

    function showStatus(message, isError) {
      status.textContent = message;
      status.classList.toggle("error", Boolean(isError));
    }

    function updateCount() {
      charCount.textContent = sourceText.value.length.toLocaleString("ja-JP") + "文字";
    }

    function showEditor() {
      viewerMode.classList.add("hidden");
      editorMode.classList.remove("hidden");
      document.title = "文章から閲覧用サイトを作成";
      updateCount();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showViewer() {
      const title = titleInput.value.trim() || "閲覧用ページ";
      const source = sourceText.value;
      if (!source.length && !titleInput.value.length) {
        showStatus("文章またはタイトルを1文字以上入力してください。", true);
        sourceText.focus();
        return false;
      }

      viewTitle.textContent = title;
      viewContent.innerHTML = parseTextToHtml(source);
      const savedData = readInitialData();
      const dateText = savedData.createdAt || new Intl.DateTimeFormat("ja-JP", {
        year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit"
      }).format(new Date());
      viewMeta.textContent = "作成日時：" + dateText;
      editorMode.classList.add("hidden");
      viewerMode.classList.remove("hidden");
      document.title = title;
      window.scrollTo({ top: 0, behavior: "smooth" });
      return true;
    }

    function makeFileName() {
      const base = titleInput.value.trim() || "閲覧用ページ";
      const safe = base.replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, " ").trim().slice(0, 60);
      return (safe || "閲覧用ページ") + ".html";
    }

    function buildSelfHtml(startMode) {
      const clone = document.documentElement.cloneNode(true);
      const dataNode = clone.querySelector("#initialData");
      const data = {
        title: titleInput.value,
        source: sourceText.value,
        createdAt: new Intl.DateTimeFormat("ja-JP", {
          year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit"
        }).format(new Date()),
        startMode: startMode === "editor" ? "editor" : "auto"
      };
      dataNode.textContent = encodeStoredText(JSON.stringify(data));

      clone.querySelector("#editorMode").classList.add("hidden");
      clone.querySelector("#viewerMode").classList.remove("hidden");
      clone.querySelector("#pageTitle").value = "";
      clone.querySelector("#sourceText").textContent = "";
      clone.querySelector("#status").textContent = "";

      return "<!DOCTYPE html>\n" + clone.outerHTML;
    }

    function downloadSelf(startMode) {
      if (!sourceText.value.length && !titleInput.value.length) {
        showStatus("文章またはタイトルを1文字以上入力してください。", true);
        sourceText.focus();
        return;
      }

      const html = buildSelfHtml(startMode);
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = makeFileName();
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      showStatus(startMode === "editor" ? "入力画面から開始するHTMLを保存しました。" : "閲覧画面から開始するHTMLを保存しました。");
    }

    document.getElementById("saveButton").addEventListener("click", function () { downloadSelf("auto"); });
    document.getElementById("saveEditorButton").addEventListener("click", function () { downloadSelf("editor"); });
    document.getElementById("viewButton").addEventListener("click", showViewer);
    document.getElementById("editButton").addEventListener("click", showEditor);
    function buildNoteCopyHtml() {
      const title = escapeHtml(titleInput.value.trim() || "閲覧用ページ");
      const body = parseTextToHtml(sourceText.value);
      return '<article><h1>' + title + '</h1>' + body + '</article>';
    }

    function buildNoteCopyText() {
      const title = titleInput.value.trim();
      const body = parseTextToMarkdown(sourceText.value);
      return (title ? title + (body ? "\n\n" : "") : "") + body;
    }

    async function copyRichText(html, plainText) {
      if (navigator.clipboard && window.ClipboardItem) {
        const item = new ClipboardItem({
          "text/html": new Blob([html], { type: "text/html" }),
          "text/plain": new Blob([plainText], { type: "text/plain" })
        });
        await navigator.clipboard.write([item]);
        return;
      }

      const holder = document.createElement("div");
      holder.contentEditable = "true";
      holder.setAttribute("aria-hidden", "true");
      holder.style.position = "fixed";
      holder.style.left = "-9999px";
      holder.innerHTML = html;
      document.body.appendChild(holder);

      const range = document.createRange();
      range.selectNodeContents(holder);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      const copied = document.execCommand("copy");
      selection.removeAllRanges();
      holder.remove();
      if (!copied) throw new Error("リッチテキストのコピーに失敗しました。");
    }

    document.getElementById("copyNoteButton").addEventListener("click", async function () {
      const button = this;
      const original = button.textContent;
      try {
        await copyRichText(buildNoteCopyHtml(), buildNoteCopyText());
        button.textContent = "コピーしました";
      } catch (error) {
        try {
          await navigator.clipboard.writeText(buildNoteCopyText());
          button.textContent = "文字だけコピーしました";
        } catch (fallbackError) {
          button.textContent = "コピーできませんでした";
        }
      }
      setTimeout(function () { button.textContent = original; }, 1800);
    });

    document.getElementById("copyMarkdownButton").addEventListener("click", async function () {
      const title = titleInput.value.trim();
      const body = parseTextToMarkdown(sourceText.value);
      const markdown = (title ? "# " + title + (body ? "\n\n" : "") : "") + body;
      try {
        await navigator.clipboard.writeText(markdown);
        const button = this;
        const original = button.textContent;
        button.textContent = "コピーしました";
        setTimeout(function () { button.textContent = original; }, 1400);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = markdown;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    });
    document.getElementById("sampleButton").addEventListener("click", function () {
      titleInput.value = "旅行の予定";
      sourceText.value = "旅行の予定\n\n集合場所\n東京駅の丸の内南口に、午前9時までに集合します。\n\nしかしながら、\n雨天の場合は予定を変更します。\nただ、\n小雨なら予定どおり進めます。\n\n参考サイト\nhttps://www.jreast.co.jp/\n\n持ち物\nスマートフォン\n充電器\n飲み物\n折りたたみ傘";
      updateCount();
      showStatus("入力例を表示しました。");
    });
    document.getElementById("clearButton").addEventListener("click", function () {
      titleInput.value = "";
      sourceText.value = "";
      updateCount();
      showStatus("入力内容を消しました。");
      sourceText.focus();
    });
    sourceText.addEventListener("input", updateCount);

    document.addEventListener("keydown", function (event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
        event.preventDefault();
        downloadSelf("editor");
      }
    });

    const initialData = readInitialData();
    titleInput.value = initialData.title;
    sourceText.value = initialData.source;
    updateCount();

    if (initialData.startMode !== "editor" && (initialData.title + initialData.source).length >= 1) {
      showViewer();
    } else {
      showEditor();
    }
  });
  </script>
</body>
</html>
