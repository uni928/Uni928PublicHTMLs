  const CAPACITY_SAVE = true;

  function fromBase64(value) {
    return Uint8Array.from(atob(value), function(char) { return char.charCodeAt(0); });
  }

  async function gunzip(bytes) {
    if (!window.DecompressionStream) throw new Error('このブラウザは解凍APIに対応していません。');
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    return await new Response(stream).arrayBuffer();
  }

  function setScriptAttributes(target, attrs) {
    Object.entries(attrs || {}).forEach(function(entry) {
      const name = entry[0];
      const value = entry[1];
      if (String(name).toLowerCase() === 'src') return;
      try { target.setAttribute(name, value); } catch (_) {}
    });
  }


  function applyBodyAttributes(attrs) {
    if (!document.body) return;
    for (const attr of Array.from(document.body.attributes || [])) document.body.removeAttribute(attr.name);
    Object.entries(attrs || {}).forEach(function(entry) {
      try { document.body.setAttribute(entry[0], entry[1]); } catch (_) {}
    });
  }

  function appendCssLink(attrs) {
    const link = document.createElement('link');
    Object.entries(attrs || {}).forEach(function(entry) {
      try { link.setAttribute(entry[0], entry[1]); } catch (_) {}
    });
    if (!link.getAttribute('rel')) link.setAttribute('rel', 'stylesheet');
    document.head.appendChild(link);
  }

  async function applyStyleRecord(record) {
    const attrs = record.attrs || {};
    if (record.tag === 'link') {
      const href = attrs.href || '';
      if (href && window.CSSStyleSheet && document.adoptedStyleSheets) {
        try {
          const response = await fetch(href, { credentials: 'same-origin' });
          if (response.ok) {
            const sheet = new CSSStyleSheet();
            await sheet.replace(await response.text());
            document.adoptedStyleSheets = Array.from(document.adoptedStyleSheets || []).concat(sheet);
            return;
          }
        } catch (_) {}
      }
      appendCssLink(attrs);
      return;
    }

    const cssText = record.text || '';
    if (!cssText) return;
    if (window.CSSStyleSheet && document.adoptedStyleSheets) {
      try {
        const sheet = new CSSStyleSheet();
        await sheet.replace(cssText);
        document.adoptedStyleSheets = Array.from(document.adoptedStyleSheets || []).concat(sheet);
        return;
      } catch (_) {}
    }
    const style = document.createElement('style');
    Object.entries(attrs).forEach(function(entry) {
      try { style.setAttribute(entry[0], entry[1]); } catch (_) {}
    });
    style.textContent = cssText;
    document.head.appendChild(style);
  }

  async function applyStyleRecords(records) {
    const styles = Array.isArray(records) ? records : [];
    for (const record of styles) await applyStyleRecord(record);

  function runScriptRecord(record) {

      if (attrs.src) {

        script.onerror = finish;
        script.src = attrs.src;
        (document.body || document.documentElement).appendChild(script);
        return;
      }
      script.textContent = record.text || '';
      (document.body || document.documentElement).appendChild(script);
      finish();
    });
  }

  async function decodePackage() {
    const bytes = fromBase64(BODY_PACKAGE_DATA);
    const body = CAPACITY_SAVE ? await gunzip(bytes) : bytes;
    return JSON.parse(new TextDecoder().decode(body));
  }

  async function main() {
    try {
      const pack = await decodePackage();
      const body = pack.html || '';
      document.open();
      document.write(body);
      document.close();
      applyBodyAttributes(pack.attrs || {});
      await applyStyleRecords(pack.styles || []);
      const scripts = Array.isArray(pack.scripts) ? pack.scripts : [];
      for (const record of scripts) await runScriptRecord(record);
    } catch (error) {
      console.error('Body restore failed:', error);
      document.body.innerHTML = '<pre style="white-space:pre-wrap;color:#b42318;padding:16px;">Body restore failed: ' + String(error && error.message || error).replace(/[&<>"']/g, function(ch) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]; }) + '</pre>';
    }
  }

  main();
})();
</script>
</body>
</html>
