<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS光沢ボタン 分解サンプル</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --panel:#ffffff;
      --text:#263244;
      --muted:#68758a;
      --line:#d9e1ec;
      --accent:#476d98;
      --base-start:rgb(71,109,152);
      --base-mid:rgb(47,75,108);
      --base-end:rgb(31,51,73);
      --base-solid:rgb(47,75,108);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(127,166,216,.25), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height:1.7;
    }

    .page{
      width:min(1080px, calc(100% - 32px));
      margin:0 auto;
      padding:40px 0 56px;
    }

    .hero{
      margin-bottom:24px;
    }

    .hero__label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.78);
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    h1{
      margin:16px 0 10px;
      font-size:clamp(28px, 5vw, 44px);
      line-height:1.2;
      letter-spacing:.02em;
    }

    .lead{
      max-width:760px;
      margin:0;
      color:var(--muted);
      font-size:16px;
    }

    .layout{
      display:grid;
      grid-template-columns:260px 1fr;
      gap:20px;
      align-items:start;
    }

    .nav-panel,
    .content-panel{
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(255,255,255,.86);
      box-shadow:0 18px 42px rgba(49,72,101,.09);
      backdrop-filter:blur(10px);
    }

    .nav-panel{
      position:sticky;
      top:18px;
      padding:14px;
    }

    .nav-title{
      margin:4px 6px 12px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
    }

    .sample-tabs{
      display:grid;
      gap:8px;
    }

    .sample-tab{
      width:100%;
      border:1px solid transparent;
      border-radius:14px;
      padding:10px 12px;
      background:transparent;
      color:var(--text);
      text-align:left;
      font:inherit;
      cursor:pointer;
      transition:.15s ease;
    }

    .sample-tab:hover{
      background:#f1f5fb;
    }

    .sample-tab[aria-selected="true"]{
      border-color:#b8c9df;
      background:linear-gradient(180deg, #ffffff, #edf4fc);
      box-shadow:0 8px 20px rgba(71,109,152,.12);
    }

    .sample-tab__num{
      display:inline-grid;
      place-items:center;
      width:26px;
      height:26px;
      margin-right:8px;
      border-radius:50%;
      background:#e6eef8;
      color:#385a80;
      font-size:13px;
      font-weight:800;
    }

    .sample-tab[aria-selected="true"] .sample-tab__num{
      background:#476d98;
      color:#fff;
    }

    .content-panel{
      overflow:hidden;
    }

    .preview-area{
      display:grid;
      grid-template-columns:minmax(260px, 380px) 1fr;
      gap:22px;
      align-items:center;
      padding:28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(236,243,252,.92)),
        repeating-linear-gradient(45deg, rgba(71,109,152,.06) 0 10px, transparent 10px 20px);
      border-bottom:1px solid var(--line);
    }

    .button-stage{
      min-height:210px;
      display:grid;
      place-items:center;
      border-radius:20px;
      border:1px dashed #c5d3e5;
      background:#f7faff;
    }

    .summary h2{
      margin:0 0 8px;
      font-size:26px;
      line-height:1.3;
    }

    .summary p{
      margin:0;
      color:var(--muted);
    }

    .detail{
      padding:28px;
    }

    .detail h3{
      margin:0 0 10px;
      font-size:20px;
    }

    .detail p{
      margin:0 0 18px;
      color:var(--muted);
    }

    .code-box{
      position:relative;
      margin:0;
      border-radius:16px;
      overflow:auto;
      border:1px solid #d7e1ef;
      background:#101827;
      color:#e8f1ff;
      font-size:13px;
      line-height:1.65;
    }

    .code-box code{
      display:block;
      padding:18px;
      white-space:pre;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .query-note{
      margin-top:16px;
      padding:12px 14px;
      border-radius:14px;
      background:#f5f8fc;
      color:var(--muted);
      font-size:14px;
    }

    .query-note code{
      color:#385a80;
      font-weight:700;
    }

    .sample-button{
      position:relative;
      isolation:isolate;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6.3px;
      padding:12px 18px;
      min-height:45px;
      min-width:auto;
      width:96px;
      border:1px solid rgb(41, 68, 99);
      border-radius:12px;
      color:rgb(255, 255, 255);
      font-size:14px;
      font-weight:700;
      font-family:Arial, sans-serif;
      letter-spacing:0.35px;
      text-align:center;
      cursor:pointer;
      vertical-align:middle;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    .sample-button__label{
      position:relative;
      z-index:1;
      display:inline-flex;
      align-items:center;
      gap:6.3px;
      color:rgb(255, 255, 255);
    }

    .sample-1{
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.6), rgba(255,255,255,0) 40%),
        linear-gradient(rgba(255,255,255,.45) 0%, rgba(255,255,255,.15) 35%, rgba(255,255,255,0) 55%, rgba(0,0,0,.04) 100%),
        linear-gradient(135deg, var(--base-start) 0%, var(--base-mid) 58%, var(--base-end) 100%);
      background-blend-mode:overlay;
    }

    .sample-2{
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.6), rgba(255,255,255,0) 40%),
        var(--base-solid);
    }

    .sample-3{
      background:
        linear-gradient(rgba(255,255,255,.45) 0%, rgba(255,255,255,.15) 35%, rgba(255,255,255,0) 55%, rgba(0,0,0,.04) 100%),
        var(--base-solid);
    }

    .sample-4{
      background:var(--base-solid);
    }

    .sample-4::before{
      content:"";
      position:absolute;
      inset:1px 1px auto 1px;
      height:20px;
      z-index:0;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.28) 0%, rgba(255,255,255,.13) 46%, rgba(255,255,255,.035) 76%, rgba(255,255,255,0) 100%);
      opacity:.32;
      pointer-events:none;
    }

    .sample-5{
      background:var(--base-solid);
      box-shadow:rgba(255,255,255,.58) 0 1px 0 inset;
    }

    .sample-6{
      background:var(--base-solid);
      transition:transform .15s ease, filter .15s ease;
    }

    .sample-6:hover{
      transform:translateY(-2px);
      filter:saturate(1.03) brightness(1.02);
    }

    .sample-7{
      background:var(--base-solid);
      transition:transform .15s ease, filter .15s ease;
    }

    .sample-7:active{
      transform:translateY(1px) scale(.985);
      filter:saturate(.99) brightness(.975);
    }

    .sample-8{
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.6), rgba(255,255,255,0) 40%),
        linear-gradient(rgba(255,255,255,.45) 0%, rgba(255,255,255,.15) 35%, rgba(255,255,255,0) 55%, rgba(0,0,0,.04) 100%),
        linear-gradient(135deg, var(--base-start) 0%, var(--base-mid) 58%, var(--base-end) 100%);
      background-blend-mode:overlay;
      box-shadow:
        rgba(36,52,71,.12) 0 8px 18px,
        rgba(255,255,255,.58) 0 1px 0 inset;
      transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
    }

    .sample-8::before{
      content:"";
      position:absolute;
      inset:1px 1px auto 1px;
      height:20px;
      z-index:0;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.28) 0%, rgba(255,255,255,.13) 46%, rgba(255,255,255,.035) 76%, rgba(255,255,255,0) 100%);
      opacity:.32;
      pointer-events:none;
    }

    .sample-8:hover{
      transform:translateY(-2px);
      filter:saturate(1.03) brightness(1.02);
    }

    .sample-8:active{
      transform:translateY(1px) scale(.985);
      filter:saturate(.99) brightness(.975);
    }

    @media (max-width: 820px){
      .layout{
        grid-template-columns:1fr;
      }

      .nav-panel{
        position:static;
      }

      .sample-tabs{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .preview-area{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 520px){
      .page{
        width:min(100% - 20px, 1080px);
        padding-top:24px;
      }

      .sample-tabs{
        grid-template-columns:1fr;
      }

      .preview-area,
      .detail{
        padding:20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero__label">CSS Button Study</div>
      <h1>光沢ボタンの工夫を<br>1つずつ分解して見るサイト</h1>
      <p class="lead">
        完成形のボタンを構成する7つのポイントを、同じ形のボタンで比較できる紹介用サイトです。
        1は複数グラデーションだけ、2以降は単一背景に各ポイントだけを加えています。
      </p>
    </section>

    <section class="layout">
      <aside class="nav-panel" aria-label="サンプル選択">
        <div class="nav-title">SELECT SAMPLE</div>
        <div class="sample-tabs" id="sampleTabs"></div>
      </aside>

      <section class="content-panel">
        <div class="preview-area">
          <div class="button-stage">
            <button id="previewButton" class="sample-button sample-1">
              <span class="sample-button__label">保存</span>
            </button>
          </div>
          <div class="summary">
            <h2 id="sampleTitle"></h2>
            <p id="sampleLead"></p>
          </div>
        </div>

        <div class="detail">
          <h3>解説</h3>
          <p id="sampleDescription"></p>

          <h3>該当CSS</h3>
          <pre class="code-box"><code id="sampleCode"></code></pre>

          <div class="query-note">
            URLに <code>?sample=3</code> のように付けると、最初から指定番号を開けます。
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const samples = {
      1: {
        title: '1. グラデーションを重ねて質感を作る',
        lead: '複数の背景レイヤーを重ね、単色では出せない奥行きと光沢感を作ります。',
        description: 'radial-gradient、linear-gradient、ベースの斜めグラデーションを重ねた例です。完成形の印象に近いですが、ここでは「背景を重ねる」ことだけに注目します。',
        className: 'sample-1',
        code: `.sample-1{
  background:
    radial-gradient(
      circle at 20% 0%,
      rgba(255,255,255,.6),
      rgba(255,255,255,0) 40%
    ),
    linear-gradient(
      rgba(255,255,255,.45) 0%,
      rgba(255,255,255,.15) 35%,
      rgba(255,255,255,0) 55%,
      rgba(0,0,0,.04) 100%
    ),
    linear-gradient(
      135deg,
      rgb(71,109,152) 0%,
      rgb(47,75,108) 58%,
      rgb(31,51,73) 100%
    );
  background-blend-mode:overlay;
}`
      },
      2: {
        title: '2. 左上を白くして反射を作る',
        lead: '単一背景に左上だけ白い円形グラデーションを重ね、光が当たっているように見せます。',
        description: 'circle at 20% 0% にすることで、中央ではなく左上寄りにハイライトが入ります。ボタン表面の反射を表現しやすい方法です。',
        className: 'sample-2',
        code: `.sample-2{
  background:
    radial-gradient(
      circle at 20% 0%,
      rgba(255,255,255,.6),
      rgba(255,255,255,0) 40%
    ),
    rgb(47,75,108);
}`
      },
      3: {
        title: '3. 上側だけ明るくして立体感を出す',
        lead: '単一背景に上から下へ薄くなる白を重ね、上面に光が当たっているようにします。',
        description: '上部は明るく、中央以降は透明に近づけます。下側まで白くしすぎないことで、自然な丸みと立体感が出ます。',
        className: 'sample-3',
        code: `.sample-3{
  background:
    linear-gradient(
      rgba(255,255,255,.45) 0%,
      rgba(255,255,255,.15) 35%,
      rgba(255,255,255,0) 55%,
      rgba(0,0,0,.04) 100%
    ),
    rgb(47,75,108);
}`
      },
      4: {
        title: '4. 擬似要素で表面の膜を作る',
        lead: '単一背景の上に::beforeで半透明の白い膜を置き、ガラスっぽい表面感を足します。',
        description: '疑似要素をボタン上部だけに配置しています。opacityを控えめにすることで、強すぎない自然なツヤになります。',
        className: 'sample-4',
        code: `.sample-4{
  position:relative;
  overflow:hidden;
  background:rgb(47,75,108);
}

.sample-4::before{
  content:"";
  position:absolute;
  inset:1px 1px auto 1px;
  height:20px;
  border-radius:12px;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,.28) 0%,
    rgba(255,255,255,.13) 46%,
    rgba(255,255,255,.035) 76%,
    rgba(255,255,255,0) 100%
  );
  opacity:.32;
  pointer-events:none;
}`
      },
      5: {
        title: '5. insetのbox-shadowで内側の光を作る',
        lead: '単一背景に内側の白い線を加え、上辺が光っているように見せます。',
        description: 'inset shadowは、ボタンの内側に影や光を入れたいときに便利です。今回は白を使って、上辺のハイライトとして使っています。',
        className: 'sample-5',
        code: `.sample-5{
  background:rgb(47,75,108);
  box-shadow:
    rgba(255,255,255,.58) 0 1px 0 inset;
}`
      },
      6: {
        title: '6. hover時に少し浮かせる',
        lead: '単一背景のボタンを、hover時に少しだけ上へ動かします。',
        description: 'translateY(-2px)程度の小さな動きにすると、派手すぎず上品なインタラクションになります。brightnessも少し上げています。',
        className: 'sample-6',
        code: `.sample-6{
  background:rgb(47,75,108);
  transition:
    transform .15s ease,
    filter .15s ease;
}

.sample-6:hover{
  transform:translateY(-2px);
  filter:saturate(1.03) brightness(1.02);
}`
      },
      7: {
        title: '7. active時は少し沈ませる',
        lead: '単一背景のボタンを、クリック中だけ少し沈ませて押し込み感を出します。',
        description: 'translateY(1px)とscale(.985)を組み合わせると、押した瞬間の沈み込みが自然に見えます。実際にボタンを押して確認できます。',
        className: 'sample-7',
        code: `.sample-7{\n  background:rgb(47,75,108);\n  transition:\n    transform .15s ease,\n    filter .15s ease;\n}\n\n.sample-7:active{\n  transform:translateY(1px) scale(.985);\n  filter:saturate(.99) brightness(.975);\n}`
      },
      8: {
        title: '8. 完成版',
        lead: 'これまでの要素を組み合わせた、最終的な光沢ボタンです。',
        description: '背景の多重グラデーション、左上の反射、上部のハイライト、擬似要素、内側の光、hover、activeを全て組み合わせています。単体では小さな差でも、積み重なることで質感が大きく変わります。',
        className: 'sample-8',
        code: `.sample-8{\n  position:relative;\n  overflow:hidden;\n\n  background:\n    radial-gradient(\n      circle at 20% 0%,\n      rgba(255,255,255,.6),\n      rgba(255,255,255,0) 40%\n    ),\n\n    linear-gradient(\n      rgba(255,255,255,.45) 0%,\n      rgba(255,255,255,.15) 35%,\n      rgba(255,255,255,0) 55%,\n      rgba(0,0,0,.04) 100%\n    ),\n\n    linear-gradient(\n      135deg,\n      rgb(71,109,152) 0%,\n      rgb(47,75,108) 58%,\n      rgb(31,51,73) 100%\n    );\n\n  background-blend-mode:overlay;\n\n  box-shadow:\n    rgba(36,52,71,.12) 0 8px 18px,\n    rgba(255,255,255,.58) 0 1px 0 inset;\n\n  transition:\n    transform .15s ease,\n    filter .15s ease,\n    box-shadow .15s ease;\n}\n\n.sample-8::before{\n  content:"";\n  position:absolute;\n  inset:1px 1px auto 1px;\n  height:20px;\n  border-radius:12px;\n  background:linear-gradient(\n    180deg,\n    rgba(255,255,255,.28) 0%,\n    rgba(255,255,255,.13) 46%,\n    rgba(255,255,255,.035) 76%,\n    rgba(255,255,255,0) 100%\n  );\n  opacity:.32;\n  pointer-events:none;\n}\n\n.sample-8:hover{\n  transform:translateY(-2px);\n  filter:saturate(1.03) brightness(1.02);\n}\n\n.sample-8:active{\n  transform:translateY(1px) scale(.985);\n  filter:saturate(.99) brightness(.975);\n}`
      }
    };

    const tabs = document.getElementById('sampleTabs');
    const previewButton = document.getElementById('previewButton');
    const sampleTitle = document.getElementById('sampleTitle');
    const sampleLead = document.getElementById('sampleLead');
    const sampleDescription = document.getElementById('sampleDescription');
    const sampleCode = document.getElementById('sampleCode');

    function normalizeSample(value){
      const num = Number(value);
      return samples[num] ? num : 1;
    }

    function selectSample(num, shouldPush = true){
      const sample = samples[num];

      previewButton.className = `sample-button ${sample.className}`;
      sampleTitle.textContent = sample.title;
      sampleLead.textContent = sample.lead;
      sampleDescription.textContent = sample.description;
      sampleCode.textContent = sample.code;

      document.querySelectorAll('.sample-tab').forEach((button) => {
        const selected = Number(button.dataset.sample) === num;
        button.setAttribute('aria-selected', String(selected));
      });

      if(shouldPush){
        const url = new URL(window.location.href);
        url.searchParams.set('sample', String(num));
        history.pushState({ sample:num }, '', url);
      }
    }

    Object.entries(samples).forEach(([num, sample]) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'sample-tab';
      button.dataset.sample = num;
      button.setAttribute('aria-selected', 'false');
      button.innerHTML = `<span class="sample-tab__num">${num}</span>${sample.title.replace(/^\d+\.\s*/, '')}`;
      button.addEventListener('click', () => selectSample(Number(num)));
      tabs.appendChild(button);
    });

    const params = new URLSearchParams(window.location.search);
    const initialSample = normalizeSample(params.get('sample'));
    selectSample(initialSample, false);

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(window.location.search);
      selectSample(normalizeSample(params.get('sample')), false);
    });
  </script>
</body>
</html>
