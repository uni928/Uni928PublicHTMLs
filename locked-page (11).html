function fromBase64(value) {
  return Uint8Array.from(atob(value), char => char.charCodeAt(0));
}

function toBase64(buffer) {
  const bytes = buffer instanceof Uint8Array ? buffer : new Uint8Array(buffer);
  let binary = '';
  const chunkSize = 32768;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
  }

  try {
    const hiddenPassphrase = await readHiddenTailPassphrase();
    const ok = await tryUnlockWithPassphrase(hiddenPassphrase, { showProgress: true, showFailure: false, saveOnSuccess: false });
    if (ok) return;
  } catch (_) {}

  let queryTried = false;
  if (QUERY_UNLOCK) {
    const key = new URLSearchParams(window.location.search).get('key');
    if (key) {
      queryTried = true;
      const unlockKeyInput = document.getElementById('unlockKey');
      if (unlockKeyInput) unlockKeyInput.value = key;
      hideQueryKey();
      const ok = await tryUnlockWithPassphrase(key, { showProgress: true, showFailure: true, saveOnSuccess: true });
      if (ok) return;
    }
  }

  const savedOk = await trySavedPasswordsSilently();
  if (!savedOk && !queryTried) showUnlockScreen();
}

const unlockButtonNode = document.getElementById('unlockButton');
const unlockKeyNode = document.getElementById('unlockKey');
const openUnlockFileButtonNode = document.getElementById('openUnlockFileButton');
const unlockFileInputNode = document.getElementById('unlockFileInput');
if (unlockButtonNode) unlockButtonNode.addEventListener('click', unlock);
if (unlockKeyNode) unlockKeyNode.addEventListener('keydown', event => {
  if (event.key === 'Enter') unlock();
});
if (openUnlockFileButtonNode && unlockFileInputNode) openUnlockFileButtonNode.addEventListener('click', () => {
  unlockFileInputNode.click();
});
if (unlockFileInputNode) unlockFileInputNode.addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if (file) openUnlockFile(file);
  event.target.value = '';
});
boot();
</script>
