<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Previewer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f9fafb;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      width: 100vw;
      height: 100vh;
    }

    aside {
      background: #020617;
      border-right: 1px solid #1f2937;
      padding: 20px;
      overflow-y: auto;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 8px;
    }

    .subtitle {
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .panel {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .drop-zone {
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 22px 14px;
      text-align: center;
      color: #cbd5e1;
      cursor: pointer;
      transition: 0.2s;
      background: #020617;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #38bdf8;
      color: #e0f2fe;
      background: #082f49;
    }

    input[type="file"] {
      display: none;
    }

    label,
    .control-label {
      display: block;
      font-size: 12px;
      color: #cbd5e1;
      margin: 12px 0 6px;
    }

    input[type="range"],
    select {
      width: 100%;
    }

    select,
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: #334155;
    }

    .primary {
      background: #0284c7;
    }

    .primary:hover {
      background: #0369a1;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
      word-break: break-all;
      min-height: 40px;
    }

    main {
      position: relative;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    .toolbar {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 3;
    }

    .toolbar button {
      width: auto;
      margin: 0;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #94a3b8;
      pointer-events: none;
      z-index: 1;
    }

    .hint strong {
      display: block;
      color: #e5e7eb;
      font-size: 22px;
      margin-bottom: 8px;
    }

    @media (max-width: 800px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        max-height: 46vh;
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>3D Model Previewer</h1>
      <div class="subtitle">
        GLB / GLTF / OBJ / FBX ファイルをドラッグ＆ドロップして、ブラウザ上で3Dモデルを確認できます。
      </div>

      <div class="panel">
        <div class="panel-title">モデル読み込み</div>
        <label class="drop-zone" id="dropZone">
          <input id="fileInput" type="file" accept=".glb,.gltf,.obj,.fbx,.png,.jpg,.jpeg,.webp,.bmp,.gif,.tga" multiple />
          ここにモデルとテクスチャをまとめてドロップ<br />またはクリックして複数選択
        </label>
        <button class="primary" id="sampleBtn">サンプルを表示</button>
      </div>

      <div class="panel">
        <div class="panel-title">表示設定</div>

        <label class="control-label" for="backgroundSelect">背景</label>
        <select id="backgroundSelect">
          <option value="dark">ダーク</option>
          <option value="light">ライト</option>
          <option value="grid">グリッド強調</option>
        </select>

        <label class="control-label" for="scaleRange">モデルサイズ</label>
        <input id="scaleRange" type="range" min="0.1" max="5" step="0.1" value="1" />

        <label class="control-label" for="rotationRange">自動回転速度</label>
        <input id="rotationRange" type="range" min="0" max="0.04" step="0.002" value="0.01" />

        <div class="row">
          <button id="resetCameraBtn">カメラ初期化</button>
          <button id="centerBtn">中央配置</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">モデル情報</div>
        <div class="status" id="status">まだモデルは読み込まれていません。FBXと同じフォルダにあるテクスチャ画像も、まとめて選択またはドロップしてください。</div>
      </div>
    </aside>

    <main>
      <canvas id="viewer"></canvas>
      <div class="hint" id="hint">
        <strong>3Dモデルを読み込んでください</strong>
        マウスドラッグで回転、ホイールで拡大縮小できます。
      </div>
      <div class="toolbar">
        <button id="wireframeBtn">ワイヤー表示</button>
        <button id="screenshotBtn">画像保存</button>
      </div>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    const canvas = document.getElementById('viewer');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const statusEl = document.getElementById('status');
    const hintEl = document.getElementById('hint');
    const scaleRange = document.getElementById('scaleRange');
    const rotationRange = document.getElementById('rotationRange');
    const backgroundSelect = document.getElementById('backgroundSelect');
    const resetCameraBtn = document.getElementById('resetCameraBtn');
    const centerBtn = document.getElementById('centerBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const wireframeBtn = document.getElementById('wireframeBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 1000);
    camera.position.set(3, 2.4, 4.5);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.HemisphereLight(0xffffff, 0x334155, 1.8);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(5, 7, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x93c5fd, 0.9);
    fillLight.position.set(-4, 3, -5);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(10, 20, 0x64748b, 0x334155);
    scene.add(grid);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.ShadowMaterial({ opacity: 0.22 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    let currentModel = null;
    let originalMaterials = [];
    let wireframe = false;
    let activeObjectUrls = [];

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
      renderer.setSize(rect.width, rect.height, false);
    }

    window.addEventListener('resize', resize);
    resize();

    function clearModel() {
      activeObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      activeObjectUrls = [];

      if (!currentModel) return;
      scene.remove(currentModel);
      currentModel.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((mat) => mat.dispose && mat.dispose());
        }
      });
      currentModel = null;
      originalMaterials = [];
    }

    function prepareModel(model, fileName = 'サンプルモデル') {
      clearModel();
      currentModel = model;
      scene.add(currentModel);

      currentModel.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          originalMaterials.push({ obj, material: obj.material });
        }
      });

      scaleRange.value = 1;
      wireframe = false;
      wireframeBtn.textContent = 'ワイヤー表示';
      centerModel();
      fitCameraToModel();
      hintEl.style.display = 'none';

      const info = getModelInfo(currentModel);
      statusEl.innerHTML = [
        `読み込み完了：${escapeHtml(fileName)}`,
        `メッシュ数：${formatNumber(info.meshCount)}`,
        `頂点数：${formatNumber(info.vertexCount)}`,
        `面数：${formatNumber(info.faceCount)}`,
        `マテリアル数：${formatNumber(info.materialCount)}`,
        `サイズ：${formatSize(info.size)}`
      ].join('<br>');
    }

    function getModelInfo(root) {
      const info = {
        meshCount: 0,
        vertexCount: 0,
        faceCount: 0,
        materialCount: 0,
        size: new THREE.Vector3()
      };

      const materials = new Set();

      root.traverse((obj) => {
        if (!obj.isMesh) return;

        info.meshCount++;

        const geometry = obj.geometry;
        if (geometry) {
          const position = geometry.getAttribute('position');
          if (position) {
            info.vertexCount += position.count;
          }

          if (geometry.index) {
            info.faceCount += Math.floor(geometry.index.count / 3);
          } else if (position) {
            info.faceCount += Math.floor(position.count / 3);
          }
        }

        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach((mat) => {
          if (mat) materials.add(mat);
        });
      });

      info.materialCount = materials.size;

      const box = new THREE.Box3().setFromObject(root);
      if (!box.isEmpty()) {
        box.getSize(info.size);
      }

      return info;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('ja-JP');
    }

    function formatSize(size) {
      return `${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function centerModel() {
      if (!currentModel) return;
      const box = new THREE.Box3().setFromObject(currentModel);
      const center = box.getCenter(new THREE.Vector3());
      currentModel.position.sub(center);

      const newBox = new THREE.Box3().setFromObject(currentModel);
      const minY = newBox.min.y;
      currentModel.position.y -= minY;
    }

    function fitCameraToModel() {
      if (!currentModel) return;
      const box = new THREE.Box3().setFromObject(currentModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z) || 1;
      const distance = maxSize * 2.1;

      camera.position.set(center.x + distance, center.y + distance * 0.7, center.z + distance);
      camera.near = distance / 100;
      camera.far = distance * 100;
      camera.updateProjectionMatrix();
      controls.target.copy(center);
      controls.update();
    }

    function createFileMap(files) {
      const map = new Map();
      files.forEach((file) => {
        map.set(file.name, file);
        map.set(file.name.toLowerCase(), file);

        if (file.webkitRelativePath) {
          map.set(file.webkitRelativePath, file);
          map.set(file.webkitRelativePath.toLowerCase(), file);
        }
      });
      return map;
    }

    function createLoadingManager(fileMap, objectUrls) {
      const manager = new THREE.LoadingManager();

      manager.setURLModifier((url) => {
        const cleanUrl = decodeURIComponent(url)
          .replace(/^\.\//, '')
          .replace(/^\//, '')
          .replaceAll('\\', '/');

        const fileName = cleanUrl.split('/').pop();
        const candidates = [
          cleanUrl,
          cleanUrl.toLowerCase(),
          fileName,
          fileName ? fileName.toLowerCase() : ''
        ];

        for (const key of candidates) {
          if (fileMap.has(key)) {
            const objectUrl = URL.createObjectURL(fileMap.get(key));
            objectUrls.push(objectUrl);
            return objectUrl;
          }
        }

        return url;
      });

      return manager;
    }

    function keepUrlsAlive(urls) {
      activeObjectUrls.push(...urls);
    }

    function getMainModelFile(files) {
      return files.find((file) => /\.(glb|gltf|obj|fbx)$/i.test(file.name));
    }

    function loadFileList(fileList) {
      const files = Array.from(fileList || []);
      const file = getMainModelFile(files);

      if (!file) {
        statusEl.textContent = 'モデルファイルが見つかりません。GLB / GLTF / OBJ / FBX のいずれかを含めてください。';
        return;
      }

      loadFile(file, files);
    }

    function isTextureFile(file) {
      const name = file.name.toLowerCase();
      return ['.png', '.jpg', '.jpeg', '.webp', '.bmp', '.gif', '.tga'].some((ext) => name.endsWith(ext));
    }

    function normalizeTextureName(name) {
      const baseName = name.toLowerCase().split('/').pop().split('\\').pop();
      const withoutExt = baseName.includes('.') ? baseName.substring(0, baseName.lastIndexOf('.')) : baseName;
      return withoutExt
        .replaceAll('_', '')
        .replaceAll('-', '')
        .replaceAll(' ', '')
        .replaceAll('.', '');
    }

    function findTextureFileByType(files, typeWords) {
      const textures = files.filter(isTextureFile);
      if (textures.length === 0) return null;

      const hit = textures.find((file) => {
        const name = normalizeTextureName(file.name);
        return typeWords.some((word) => name.includes(word));
      });

      return hit || textures[0];
    }

    function loadTextureFromFile(file, objectUrls) {
      if (!file) return null;
      const textureUrl = URL.createObjectURL(file);
      objectUrls.push(textureUrl);

      const texture = new THREE.TextureLoader().load(textureUrl);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.flipY = false;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      return texture;
    }

    function applyExternalTexturesToFBX(fbx, files, objectUrls) {
      const diffuseFile = findTextureFileByType(files, [
        'basecolor',
        'basecolour',
        'diffuse',
        'albedo',
        'color',
        'colour',
        'col',
        'tex'
      ]);
      const normalFile = findTextureFileByType(files, ['normal', 'nrm', 'bump']);
      const roughnessFile = findTextureFileByType(files, ['roughness', 'rough']);
      const metalnessFile = findTextureFileByType(files, ['metallic', 'metalness', 'metal']);

      const diffuseTexture = loadTextureFromFile(diffuseFile, objectUrls);
      const normalTexture = normalFile && normalFile !== diffuseFile ? loadTextureFromFile(normalFile, objectUrls) : null;
      const roughnessTexture = roughnessFile && roughnessFile !== diffuseFile ? loadTextureFromFile(roughnessFile, objectUrls) : null;
      const metalnessTexture = metalnessFile && metalnessFile !== diffuseFile ? loadTextureFromFile(metalnessFile, objectUrls) : null;

      fbx.traverse((child) => {
        if (!child.isMesh) return;

        const oldMaterials = Array.isArray(child.material) ? child.material : [child.material];
        const newMaterials = oldMaterials.map((oldMat) => {
          const mat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.65,
            metalness: 0.05,
            side: THREE.DoubleSide
          });

          if (oldMat && oldMat.map) mat.map = oldMat.map;
          if (diffuseTexture && !mat.map) mat.map = diffuseTexture;
          if (normalTexture) mat.normalMap = normalTexture;
          if (roughnessTexture) mat.roughnessMap = roughnessTexture;
          if (metalnessTexture) mat.metalnessMap = metalnessTexture;

          mat.needsUpdate = true;
          return mat;
        });

        child.material = Array.isArray(child.material) ? newMaterials : newMaterials[0];
        child.castShadow = true;
        child.receiveShadow = true;
      });

      return Boolean(diffuseTexture);
    }

    function loadFile(file, allFiles = [file]) {
      if (!file) return;

      const extension = file.name.split('.').pop().toLowerCase();
      const objectUrls = [];
      const fileMap = createFileMap(allFiles);
      const manager = createLoadingManager(fileMap, objectUrls);
      const url = URL.createObjectURL(file);
      objectUrls.push(url);
      statusEl.textContent = `読み込み中：${file.name}`;

      const onLoaded = (model) => {
        prepareModel(model, file.name);
        keepUrlsAlive(objectUrls);
      };

      const onError = (error) => {
        objectUrls.forEach((url) => URL.revokeObjectURL(url));
        showError(error);
      };

      if (extension === 'glb' || extension === 'gltf') {
        const loader = new GLTFLoader(manager);
        loader.load(
          url,
          (gltf) => onLoaded(gltf.scene),
          undefined,
          onError
        );
      } else if (extension === 'obj') {
        const loader = new OBJLoader(manager);
        loader.load(
          url,
          (obj) => {
            obj.traverse((child) => {
              if (child.isMesh && !child.material) {
                child.material = new THREE.MeshStandardMaterial({ color: 0xcbd5e1, roughness: 0.7 });
              }
            });
            onLoaded(obj);
          },
          undefined,
          onError
        );
      } else if (extension === 'fbx') {
        const loader = new FBXLoader(manager);
        loader.load(
          url,
          (fbx) => {
            const textureApplied = applyExternalTexturesToFBX(fbx, allFiles, objectUrls);
            onLoaded(fbx);
            if (textureApplied) {
              statusEl.innerHTML += '<br>外部テクスチャを反映しました。';
            } else {
              statusEl.innerHTML += '<br>外部テクスチャは見つかりませんでした。';
            }
          },
          undefined,
          onError
        );
      } else {
        objectUrls.forEach((url) => URL.revokeObjectURL(url));
        statusEl.textContent = '対応形式は GLB / GLTF / OBJ / FBX です。';
      }
    }

    function showError(error) {
      console.error(error);
      statusEl.textContent = 'モデルの読み込みに失敗しました。FBXとテクスチャ画像をまとめて選択しているか、ファイル名の参照が一致しているか確認してください。';
    }

    fileInput.addEventListener('change', (event) => loadFileList(event.target.files));

    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (event) => {
      event.preventDefault();
      dropZone.classList.remove('dragover');
      loadFileList(event.dataTransfer.files);
    });

    scaleRange.addEventListener('input', () => {
      if (!currentModel) return;
      const scale = Number(scaleRange.value);
      currentModel.scale.setScalar(scale);
      centerModel();
    });

    backgroundSelect.addEventListener('change', () => {
      const value = backgroundSelect.value;
      if (value === 'light') {
        scene.background = new THREE.Color(0xe5e7eb);
        grid.material.color.set(0x64748b);
        grid.material.opacity = 0.45;
        grid.material.transparent = true;
      } else if (value === 'grid') {
        scene.background = new THREE.Color(0x020617);
        grid.material.color.set(0x38bdf8);
        grid.material.opacity = 0.75;
        grid.material.transparent = true;
      } else {
        scene.background = new THREE.Color(0x111827);
        grid.material.color.set(0x64748b);
        grid.material.opacity = 1;
        grid.material.transparent = false;
      }
    });

    resetCameraBtn.addEventListener('click', fitCameraToModel);
    centerBtn.addEventListener('click', centerModel);

    sampleBtn.addEventListener('click', () => {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.TorusKnotGeometry(0.75, 0.22, 160, 24),
        new THREE.MeshStandardMaterial({ color: 0x38bdf8, roughness: 0.25, metalness: 0.35 })
      );
      body.position.y = 1.25;
      group.add(body);

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.95, 1.15, 0.3, 48),
        new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.6, metalness: 0.15 })
      );
      base.position.y = 0.15;
      group.add(base);

      prepareModel(group, 'サンプルモデル');
    });

    wireframeBtn.addEventListener('click', () => {
      if (!currentModel) return;
      wireframe = !wireframe;
      currentModel.traverse((obj) => {
        if (obj.isMesh) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((mat) => {
            mat.wireframe = wireframe;
          });
        }
      });
      wireframeBtn.textContent = wireframe ? '通常表示' : 'ワイヤー表示';
    });

    screenshotBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = '3d-preview.png';
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      if (currentModel) {
        currentModel.rotation.y += Number(rotationRange.value);
      }
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
