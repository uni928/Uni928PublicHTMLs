<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Previewer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f9fafb;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      width: 100vw;
      height: 100vh;
    }

    aside {
      background: #020617;
      border-right: 1px solid #1f2937;
      padding: 20px;
      overflow-y: auto;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 8px;
    }

    .subtitle {
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .panel {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .drop-zone {
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 22px 14px;
      text-align: center;
      color: #cbd5e1;
      cursor: pointer;
      transition: 0.2s;
      background: #020617;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #38bdf8;
      color: #e0f2fe;
      background: #082f49;
    }

    input[type="file"] {
      display: none;
    }

    label,
    .control-label {
      display: block;
      font-size: 12px;
      color: #cbd5e1;
      margin: 12px 0 6px;
    }

    input[type="range"],
    select {
      width: 100%;
    }

    select,
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #1e293b;
      color: #f8fafc;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: #334155;
    }

    .primary {
      background: #0284c7;
    }

    .primary:hover {
      background: #0369a1;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
      word-break: break-all;
      min-height: 40px;
    }

    main {
      position: relative;
      overflow: hidden;
    }

    #viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    .toolbar {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 3;
    }

    .toolbar button {
      width: auto;
      margin: 0;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #94a3b8;
      pointer-events: none;
      z-index: 1;
    }

    .hint strong {
      display: block;
      color: #e5e7eb;
      font-size: 22px;
      margin-bottom: 8px;
    }

    @media (max-width: 800px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        max-height: 46vh;
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>3D Model Previewer</h1>
      <div class="subtitle">
        GLB / GLTF / OBJ / FBX ファイルをドラッグ＆ドロップして、ブラウザ上で3Dモデルを確認できます。
      </div>

      <div class="panel">
        <div class="panel-title">モデル読み込み</div>
        <label class="drop-zone" id="dropZone">
          <input id="fileInput" type="file" accept=".glb,.gltf,.obj,.fbx,.mtl,.png,.jpg,.jpeg,.webp,.bmp,.gif,.tga" multiple />
          ここにモデル・テクスチャ・フォルダをまとめてドロップ<br />またはクリックして複数選択
        </label>
        <button class="primary" id="sampleBtn">サンプルを表示</button>
      </div>

      <div class="panel">
        <div class="panel-title">表示設定</div>

        <label class="control-label" for="backgroundSelect">背景</label>
        <select id="backgroundSelect">
          <option value="dark">ダーク</option>
          <option value="light">ライト</option>
          <option value="grid">グリッド強調</option>
        </select>

        <label class="control-label" for="scaleRange">モデルサイズ</label>
        <input id="scaleRange" type="range" min="0.1" max="5" step="0.1" value="1" />

        <label class="control-label" for="rotationRange">自動回転速度</label>
        <input id="rotationRange" type="range" min="0" max="0.04" step="0.002" value="0.01" />

        <div class="row">
          <button id="resetCameraBtn">カメラ初期化</button>
          <button id="centerBtn">中央配置</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">モデル情報</div>
        <div class="status" id="status">まだモデルは読み込まれていません。FBXとテクスチャ画像、またはそれらを含むフォルダをまとめてドロップしてください。</div>
      </div>
    </aside>

    <main>
      <canvas id="viewer"></canvas>
      <div class="hint" id="hint">
        <strong>3Dモデルを読み込んでください</strong>
        マウスドラッグで回転、ホイールで拡大縮小できます。
      </div>
      <div class="toolbar">
        <button id="wireframeBtn">ワイヤー表示</button>
        <button id="screenshotBtn">画像保存</button>
      </div>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    const canvas = document.getElementById('viewer');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const statusEl = document.getElementById('status');
    const hintEl = document.getElementById('hint');
    const scaleRange = document.getElementById('scaleRange');
    const rotationRange = document.getElementById('rotationRange');
    const backgroundSelect = document.getElementById('backgroundSelect');
    const resetCameraBtn = document.getElementById('resetCameraBtn');
    const centerBtn = document.getElementById('centerBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const wireframeBtn = document.getElementById('wireframeBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 1000);
    camera.position.set(3, 2.4, 4.5);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.HemisphereLight(0xffffff, 0x334155, 1.8);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
    keyLight.position.set(5, 7, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x93c5fd, 0.9);
    fillLight.position.set(-4, 3, -5);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(10, 20, 0x64748b, 0x334155);
    scene.add(grid);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.ShadowMaterial({ opacity: 0.22 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    let currentModel = null;
    let originalMaterials = [];
    let wireframe = false;
    let activeObjectUrls = [];

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
      renderer.setSize(rect.width, rect.height, false);
    }

    window.addEventListener('resize', resize);
    resize();

    function clearModel() {
      activeObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      activeObjectUrls = [];

      if (!currentModel) return;
      scene.remove(currentModel);
      currentModel.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((mat) => mat.dispose && mat.dispose());
        }
      });
      currentModel = null;
      originalMaterials = [];
    }

    function prepareModel(model, fileName = 'サンプルモデル') {
      clearModel();
      currentModel = model;
      scene.add(currentModel);

      currentModel.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          originalMaterials.push({ obj, material: obj.material });
        }
      });

      scaleRange.value = 1;
      wireframe = false;
      wireframeBtn.textContent = 'ワイヤー表示';
      centerModel();
      fitCameraToModel();
      hintEl.style.display = 'none';

      const meshCount = countMeshes(currentModel);
      statusEl.innerHTML = `読み込み完了：${fileName}<br>メッシュ数：${meshCount}`;
    }

    function countMeshes(root) {
      let count = 0;
      root.traverse((obj) => {
        if (obj.isMesh) count++;
      });
      return count;
    }

    function centerModel() {
      if (!currentModel) return;
      const box = new THREE.Box3().setFromObject(currentModel);
      const center = box.getCenter(new THREE.Vector3());
      currentModel.position.sub(center);

      const newBox = new THREE.Box3().setFromObject(currentModel);
      const minY = newBox.min.y;
      currentModel.position.y -= minY;
    }

    function fitCameraToModel() {
      if (!currentModel) return;
      const box = new THREE.Box3().setFromObject(currentModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z) || 1;
      const distance = maxSize * 2.1;

      camera.position.set(center.x + distance, center.y + distance * 0.7, center.z + distance);
      camera.near = distance / 100;
      camera.far = distance * 100;
      camera.updateProjectionMatrix();
      controls.target.copy(center);
      controls.update();
    }

    function normalizeAssetPath(path) {
      return decodeURIComponent(String(path || ''))
        .replace(/^file:\/\/\//i, '')
        .replace(/^\.\//, '')
        .replace(/^\//, '')
        .replaceAll('\\', '/')
        .replace(/\/+/g, '/')
        .toLowerCase();
    }

    function getBaseName(path) {
      const normalized = normalizeAssetPath(path);
      return normalized.split('/').pop() || normalized;
    }

    function getFileRelativePath(file) {
      return file.relativePath || file.webkitRelativePath || file.name;
    }

    function createFileMap(files) {
      const exact = new Map();
      const byName = new Map();
      const entries = [];

      files.forEach((file) => {
        const relativePath = normalizeAssetPath(getFileRelativePath(file));
        const fileName = getBaseName(file.name);

        exact.set(relativePath, file);
        exact.set(normalizeAssetPath(file.name), file);
        byName.set(fileName, file);

        entries.push({ path: relativePath, name: fileName, file });
      });

      return { exact, byName, entries };
    }

    function findFileForAssetUrl(assetUrl, fileMap) {
      const cleanUrl = normalizeAssetPath(assetUrl);
      const fileName = getBaseName(cleanUrl);

      if (fileMap.exact.has(cleanUrl)) return fileMap.exact.get(cleanUrl);
      if (fileMap.byName.has(fileName)) return fileMap.byName.get(fileName);

      const suffixHit = fileMap.entries.find((entry) => {
        return entry.path.endsWith('/' + cleanUrl) || entry.path.endsWith(cleanUrl);
      });
      if (suffixHit) return suffixHit.file;

      const nameHit = fileMap.entries.find((entry) => entry.name === fileName);
      return nameHit ? nameHit.file : null;
    }

    function createLoadingManager(fileMap, objectUrls) {
      const manager = new THREE.LoadingManager();

      manager.setURLModifier((url) => {
        const matchedFile = findFileForAssetUrl(url, fileMap);
        if (matchedFile) {
          const objectUrl = URL.createObjectURL(matchedFile);
          objectUrls.push(objectUrl);
          return objectUrl;
        }

        return url;
      });

      return manager;
    }

    function keepUrlsAlive(urls) {
      activeObjectUrls.push(...urls);
    }

    function getMainModelFile(files) {
      return files.find((file) => /\.(glb|gltf|obj|fbx)$/i.test(file.name));
    }

    function loadFileList(fileList) {
      const files = Array.from(fileList || []);
      const file = getMainModelFile(files);

      if (!file) {
        statusEl.textContent = 'モデルファイルが見つかりません。GLB / GLTF / OBJ / FBX のいずれかを含めてください。OBJの場合はMTLも同時に選択できます。';
        return;
      }

      loadFile(file, files);
    }

    function readEntries(reader) {
      return new Promise((resolve) => {
        let done = false;
        const finish = (entries) => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          resolve(entries || []);
        };
        const timer = setTimeout(() => finish([]), 1500);

        try {
          reader.readEntries(
            (entries) => finish(entries),
            () => finish([])
          );
        } catch (error) {
          finish([]);
        }
      });
    }

    function getFileFromEntry(fileEntry, relativePath) {
      return new Promise((resolve) => {
        let done = false;
        const finish = (file) => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          resolve(file || null);
        };
        const timer = setTimeout(() => finish(null), 1500);

        try {
          fileEntry.file(
            (file) => {
              try {
                Object.defineProperty(file, 'relativePath', {
                  value: relativePath || file.name,
                  configurable: true
                });
              } catch (error) {
                file.relativePath = relativePath || file.name;
              }
              finish(file);
            },
            () => finish(null)
          );
        } catch (error) {
          finish(null);
        }
      });
    }

    async function collectFilesFromEntry(entry, parentPath = '') {
      if (!entry) return [];

      const currentPath = parentPath ? `${parentPath}/${entry.name}` : entry.name;

      if (entry.isFile) {
        const file = await getFileFromEntry(entry, currentPath);
        return file ? [file] : [];
      }

      if (entry.isDirectory) {
        const reader = entry.createReader();
        const files = [];

        while (true) {
          const entries = await readEntries(reader);
          if (!entries.length) break;

          for (const child of entries) {
            files.push(...await collectFilesFromEntry(child, currentPath));
          }
        }

        return files;
      }

      return [];
    }

    function getEntriesFromDataTransfer(dataTransfer) {
      return Array.from(dataTransfer.items || [])
        .map((item) => item.webkitGetAsEntry ? item.webkitGetAsEntry() : null)
        .filter(Boolean);
    }

    function hasDroppedDirectory(dataTransfer) {
      return getEntriesFromDataTransfer(dataTransfer).some((entry) => entry.isDirectory);
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function getDroppedFiles(dataTransfer) {
      const fallbackFiles = Array.from(dataTransfer.files || []);

      // 通常のファイル複数ドロップでは、ここで即座に読み込みます。
      // フォルダ展開処理に入るとブラウザ環境によって止まることがあるため、モデルファイルが見えている場合は優先します。
      if (getMainModelFile(fallbackFiles)) {
        return fallbackFiles;
      }

      const entries = getEntriesFromDataTransfer(dataTransfer);
      if (!entries.length || !hasDroppedDirectory(dataTransfer)) {
        return fallbackFiles;
      }

      const collectPromise = (async () => {
        const files = [];
        for (const entry of entries) {
          files.push(...await collectFilesFromEntry(entry));
        }
        return files;
      })();

      const files = await Promise.race([
        collectPromise,
        wait(3000).then(() => [])
      ]);

      return files.length ? files : fallbackFiles;
    }

    function isTextureFile(file) {
      const name = file.name.toLowerCase();
      return ['.png', '.jpg', '.jpeg', '.webp', '.bmp', '.gif', '.tga'].some((ext) => name.endsWith(ext));
    }

    function normalizeTextureName(name) {
      const baseName = name.toLowerCase().split('/').pop().split('\\').pop();
      const withoutExt = baseName.includes('.') ? baseName.substring(0, baseName.lastIndexOf('.')) : baseName;
      return withoutExt
        .replaceAll('_', '')
        .replaceAll('-', '')
        .replaceAll(' ', '')
        .replaceAll('.', '');
    }

    function findTextureFileByType(files, typeWords) {
      const textures = files.filter(isTextureFile);
      if (textures.length === 0) return null;

      const hit = textures.find((file) => {
        const name = normalizeTextureName(file.name);
        return typeWords.some((word) => name.includes(word));
      });

      return hit || textures[0];
    }

    function loadTextureFromFile(file, objectUrls) {
      if (!file) return null;
      const textureUrl = URL.createObjectURL(file);
      objectUrls.push(textureUrl);

      const texture = new THREE.TextureLoader().load(textureUrl);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.flipY = false;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      return texture;
    }

    function applyExternalTexturesToFBX(fbx, files, objectUrls) {
      const diffuseFile = findTextureFileByType(files, [
        'basecolor',
        'basecolour',
        'diffuse',
        'albedo',
        'color',
        'colour',
        'col',
        'tex'
      ]);
      const normalFile = findTextureFileByType(files, ['normal', 'nrm', 'bump']);
      const roughnessFile = findTextureFileByType(files, ['roughness', 'rough']);
      const metalnessFile = findTextureFileByType(files, ['metallic', 'metalness', 'metal']);

      const diffuseTexture = loadTextureFromFile(diffuseFile, objectUrls);
      const normalTexture = normalFile && normalFile !== diffuseFile ? loadTextureFromFile(normalFile, objectUrls) : null;
      const roughnessTexture = roughnessFile && roughnessFile !== diffuseFile ? loadTextureFromFile(roughnessFile, objectUrls) : null;
      const metalnessTexture = metalnessFile && metalnessFile !== diffuseFile ? loadTextureFromFile(metalnessFile, objectUrls) : null;

      fbx.traverse((child) => {
        if (!child.isMesh) return;

        const oldMaterials = Array.isArray(child.material) ? child.material : [child.material];
        const newMaterials = oldMaterials.map((oldMat) => {
          const mat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.65,
            metalness: 0.05,
            side: THREE.DoubleSide
          });

          if (oldMat && oldMat.map) mat.map = oldMat.map;
          if (diffuseTexture && !mat.map) mat.map = diffuseTexture;
          if (normalTexture) mat.normalMap = normalTexture;
          if (roughnessTexture) mat.roughnessMap = roughnessTexture;
          if (metalnessTexture) mat.metalnessMap = metalnessTexture;

          mat.needsUpdate = true;
          return mat;
        });

        child.material = Array.isArray(child.material) ? newMaterials : newMaterials[0];
        child.castShadow = true;
        child.receiveShadow = true;
      });

      return Boolean(diffuseTexture);
    }

    function isMtlFile(file) {
      return /\.mtl$/i.test(file.name);
    }

    function removeExtension(name) {
      const baseName = getBaseName(name);
      const index = baseName.lastIndexOf('.');
      return index >= 0 ? baseName.substring(0, index) : baseName;
    }

    function getMtlFileForObj(objFile, files) {
      const mtlFiles = files.filter(isMtlFile);
      if (!mtlFiles.length) return null;

      const objBase = removeExtension(objFile.name).toLowerCase();
      const sameBase = mtlFiles.find((file) => removeExtension(file.name).toLowerCase() === objBase);
      return sameBase || mtlFiles[0];
    }

    function isAlmostBlackColor(color) {
      if (!color) return false;
      return color.r < 0.03 && color.g < 0.03 && color.b < 0.03;
    }

    function fixTextureForPreview(texture, flipY = true) {
      if (!texture) return;
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.flipY = flipY;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.needsUpdate = true;
    }

    function fixMaterialForPreview(mat) {
      if (!mat) return;

      mat.side = THREE.DoubleSide;

      const textureKeys = [
        'map',
        'alphaMap',
        'aoMap',
        'bumpMap',
        'displacementMap',
        'emissiveMap',
        'lightMap',
        'metalnessMap',
        'normalMap',
        'roughnessMap',
        'specularMap'
      ];

      textureKeys.forEach((key) => {
        if (mat[key]) fixTextureForPreview(mat[key], true);
      });

      // MTLのKdが 0 0 0 の場合、map_Kdのテクスチャ色にも黒が乗算されて真っ黒になります。
      // テクスチャがある材質は白を基準色にして、画像本来の色を表示します。
      if (mat.map && mat.color) {
        mat.color.set(0xffffff);
      }

      // テクスチャがない材質まで黒く潰れる場合は、プレビュー用に最低限見える色へ補正します。
      if (!mat.map && mat.color && isAlmostBlackColor(mat.color)) {
        mat.color.set(0xcbd5e1);
      }

      if ('emissive' in mat && mat.emissive && mat.emissiveIntensity > 0) {
        mat.emissiveIntensity = Math.min(mat.emissiveIntensity, 0.25);
      }

      mat.needsUpdate = true;
    }

    function fixMaterialsForPreview(materialOrArray) {
      const materials = Array.isArray(materialOrArray) ? materialOrArray : [materialOrArray];
      materials.forEach(fixMaterialForPreview);
    }

    function applyObjMaterialFallback(obj) {
      obj.traverse((child) => {
        if (!child.isMesh) return;

        if (!child.material) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xcbd5e1,
            roughness: 0.7,
            side: THREE.DoubleSide
          });
          return;
        }

        fixMaterialsForPreview(child.material);
      });
    }

    function loadFile(file, allFiles = [file]) {
      if (!file) return;

      const extension = file.name.split('.').pop().toLowerCase();
      const objectUrls = [];
      const fileMap = createFileMap(allFiles);
      const manager = createLoadingManager(fileMap, objectUrls);
      const url = URL.createObjectURL(file);
      objectUrls.push(url);
      statusEl.textContent = `読み込み中：${file.name}`;

      const onLoaded = (model) => {
        prepareModel(model, file.name);
        keepUrlsAlive(objectUrls);
      };

      const onError = (error) => {
        objectUrls.forEach((url) => URL.revokeObjectURL(url));
        showError(error);
      };

      if (extension === 'glb' || extension === 'gltf') {
        const loader = new GLTFLoader(manager);
        loader.load(
          url,
          (gltf) => onLoaded(gltf.scene),
          undefined,
          onError
        );
      } else if (extension === 'obj') {
        const mtlFile = getMtlFileForObj(file, allFiles);

        const loadObj = (materials = null) => {
          const loader = new OBJLoader(manager);
          if (materials) loader.setMaterials(materials);

          loader.load(
            url,
            (obj) => {
              applyObjMaterialFallback(obj);
              onLoaded(obj);
              if (mtlFile) {
                statusEl.innerHTML += `<br>MTLを反映しました：${mtlFile.name}<br>黒く潰れる材質をプレビュー用に補正しました`;
              } else {
                statusEl.innerHTML += '<br>MTLファイルは見つかりませんでした。';
              }
            },
            undefined,
            onError
          );
        };

        if (mtlFile) {
          const mtlUrl = URL.createObjectURL(mtlFile);
          objectUrls.push(mtlUrl);

          const mtlLoader = new MTLLoader(manager);
          mtlLoader.setMaterialOptions({
            side: THREE.DoubleSide,
            wrap: THREE.RepeatWrapping,
            normalizeRGB: true,
            ignoreZeroRGBs: true
          });
          mtlLoader.load(
            mtlUrl,
            (materials) => {
              materials.preload();
              Object.values(materials.materials).forEach((mat) => {
                fixMaterialForPreview(mat);
              });
              loadObj(materials);
            },
            undefined,
            () => {
              statusEl.innerHTML = `MTLの読み込みに失敗しました：${mtlFile.name}<br>OBJのみで読み込みます。`;
              loadObj(null);
            }
          );
        } else {
          loadObj(null);
        }
      } else if (extension === 'fbx') {
        const loader = new FBXLoader(manager);
        loader.load(
          url,
          (fbx) => {
            const textureApplied = applyExternalTexturesToFBX(fbx, allFiles, objectUrls);
            onLoaded(fbx);
            if (textureApplied) {
              statusEl.innerHTML += '<br>外部テクスチャを反映しました。';
            } else {
              statusEl.innerHTML += '<br>外部テクスチャは見つかりませんでした。';
            }
          },
          undefined,
          onError
        );
      } else {
        objectUrls.forEach((url) => URL.revokeObjectURL(url));
        statusEl.textContent = '対応形式は GLB / GLTF / OBJ / FBX です。OBJ用のMTLも同時読み込みできます。';
      }
    }

    function showError(error) {
      console.error(error);
      statusEl.textContent = 'モデルの読み込みに失敗しました。FBXとテクスチャ画像をまとめて選択しているか、ファイル名の参照が一致しているか確認してください。';
    }

    fileInput.addEventListener('change', (event) => loadFileList(event.target.files));

    dropZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', async (event) => {
      event.preventDefault();
      event.stopPropagation();
      dropZone.classList.remove('dragover');

      const directFiles = Array.from(event.dataTransfer.files || []);

      // ファイルが直接見えている通常ドロップでは、確認処理を挟まず即読み込みます。
      if (getMainModelFile(directFiles)) {
        loadFileList(directFiles);
        return;
      }

      statusEl.textContent = 'ドロップされたファイルを確認中です...';

      try {
        const files = await getDroppedFiles(event.dataTransfer);
        if (files.length) {
          loadFileList(files);
        } else {
          statusEl.textContent = 'ドラッグ＆ドロップされたファイルを取得できませんでした。ファイル単体、またはモデルを含むフォルダをドロップしてください。';
        }
      } catch (error) {
        console.error(error);
        if (directFiles.length) {
          loadFileList(directFiles);
        } else {
          statusEl.textContent = 'ドラッグ＆ドロップされたファイルを取得できませんでした。';
        }
      }
    });

    scaleRange.addEventListener('input', () => {
      if (!currentModel) return;
      const scale = Number(scaleRange.value);
      currentModel.scale.setScalar(scale);
      centerModel();
    });

    backgroundSelect.addEventListener('change', () => {
      const value = backgroundSelect.value;
      if (value === 'light') {
        scene.background = new THREE.Color(0xe5e7eb);
        grid.material.color.set(0x64748b);
        grid.material.opacity = 0.45;
        grid.material.transparent = true;
      } else if (value === 'grid') {
        scene.background = new THREE.Color(0x020617);
        grid.material.color.set(0x38bdf8);
        grid.material.opacity = 0.75;
        grid.material.transparent = true;
      } else {
        scene.background = new THREE.Color(0x111827);
        grid.material.color.set(0x64748b);
        grid.material.opacity = 1;
        grid.material.transparent = false;
      }
    });

    resetCameraBtn.addEventListener('click', fitCameraToModel);
    centerBtn.addEventListener('click', centerModel);

    sampleBtn.addEventListener('click', () => {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.TorusKnotGeometry(0.75, 0.22, 160, 24),
        new THREE.MeshStandardMaterial({ color: 0x38bdf8, roughness: 0.25, metalness: 0.35 })
      );
      body.position.y = 1.25;
      group.add(body);

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.95, 1.15, 0.3, 48),
        new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.6, metalness: 0.15 })
      );
      base.position.y = 0.15;
      group.add(base);

      prepareModel(group, 'サンプルモデル');
    });

    wireframeBtn.addEventListener('click', () => {
      if (!currentModel) return;
      wireframe = !wireframe;
      currentModel.traverse((obj) => {
        if (obj.isMesh) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((mat) => {
            mat.wireframe = wireframe;
          });
        }
      });
      wireframeBtn.textContent = wireframe ? '通常表示' : 'ワイヤー表示';
    });

    screenshotBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = '3d-preview.png';
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      if (currentModel) {
        currentModel.rotation.y += Number(rotationRange.value);
      }
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
