<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Undo / Redo エディタ</title>
  <style>
    :root {
      --bg: #fff7e8;
      --panel: rgba(255, 251, 242, 0.9);
      --panel-border: rgba(120, 95, 55, 0.14);
      --text: #4b3d2a;
      --muted: #8c7455;
      --shadow: 0 12px 32px rgba(125, 98, 56, 0.14);
      --btn-shadow: 0 10px 24px rgba(120, 90, 50, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--text);
    }

    body {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.75), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 231, 194, 0.42), transparent 34%),
        linear-gradient(180deg, #fffaf0 0%, #fff4e2 100%);
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #editor {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      line-height: 1.9;
      padding:
        calc(env(safe-area-inset-top) + 24px)
        20px
        calc(env(safe-area-inset-bottom) + 110px)
        20px;
      caret-color: #7b5b34;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #editor::placeholder {
      color: #b39975;
    }

    .glass {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 12px);
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 3;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
      max-width: 60%;
    }

    .fab {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom) + 18px);
      width: 64px;
      height: 64px;
      border: 1px solid rgba(130, 100, 60, 0.14);
      border-radius: 22px;
      background: rgba(255, 252, 246, 0.96);
      box-shadow: var(--btn-shadow);
      display: grid;
      place-items: center;
      z-index: 5;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .fab::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(255,255,255,0));
      pointer-events: none;
    }

    .fab:active {
      transform: scale(0.97);
    }

    .fab.left {
      left: 18px;
    }

    .fab.right {
      right: 18px;
    }

    .fab button {
      all: unset;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 800;
      color: #6f5433;
      position: relative;
      z-index: 1;
    }

    .icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      line-height: 1;
    }

    .icon {
      font-size: 25px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    @media (min-width: 700px) {
      #editor {
        font-size: 20px;
        padding-left: 28px;
        padding-right: 28px;
      }

      .fab.left {
        left: 26px;
      }

      .fab.right {
        right: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="glass" aria-hidden="true">
      <div class="title">UNDO / REDO NOTE</div>
      <div class="status" id="saveStatus">保存準備中…</div>
    </div>

    <textarea id="editor" placeholder="ここに入力してください"></textarea>

    <div class="fab left">
      <button id="undoBtn" type="button" aria-label="元に戻す">
        <div class="icon-wrap">
          <div class="icon">↶</div>
          <div class="label">UNDO</div>
        </div>
      </button>
    </div>

    <div class="fab right">
      <button id="redoBtn" type="button" aria-label="やり直す">
        <div class="icon-wrap">
          <div class="icon">↷</div>
          <div class="label">REDO</div>
        </div>
      </button>
    </div>
  </div>

  <script>
    const DB_NAME = 'undoRedoEditorDB';
    const STORE_NAME = 'kv';
    const STATE_KEY = 'editorState';

    const editor = document.getElementById('editor');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const saveStatus = document.getElementById('saveStatus');

    let dbPromise = null;
    let saveTimer = null;
    let isRestoring = false;

    function openDB() {
      if (dbPromise) return dbPromise;

      dbPromise = new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });

      return dbPromise;
    }

    async function setItem(key, value) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getItem(key) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function formatTime(date) {
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    }

    function showStatus(message) {
      saveStatus.textContent = message;
    }

    async function saveState() {
      if (isRestoring) return;

      const state = {
        text: editor.value,
        selectionStart: editor.selectionStart,
        selectionEnd: editor.selectionEnd,
        scrollTop: editor.scrollTop,
        updatedAt: Date.now()
      };

      try {
        await setItem(STATE_KEY, state);
        showStatus(`保存済み ${formatTime(new Date(state.updatedAt))}`);
      } catch (error) {
        console.error(error);
        showStatus('保存失敗');
      }
    }

    function scheduleSave() {
      showStatus('保存中…');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveState, 120);
    }

    async function restoreState() {
      try {
        const state = await getItem(STATE_KEY);
        if (!state) {
          showStatus('新規メモ');
          return;
        }

        isRestoring = true;
        editor.value = state.text || '';

        requestAnimationFrame(() => {
          editor.scrollTop = state.scrollTop || 0;
          const start = Math.min(state.selectionStart ?? editor.value.length, editor.value.length);
          const end = Math.min(state.selectionEnd ?? editor.value.length, editor.value.length);
          editor.setSelectionRange(start, end);
          isRestoring = false;
          showStatus(`復元済み ${formatTime(new Date(state.updatedAt || Date.now()))}`);
        });
      } catch (error) {
        console.error(error);
        showStatus('復元失敗');
      }
    }

    function keepKeyboardStable(action) {
      const hadFocus = document.activeElement === editor;
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const scrollTop = editor.scrollTop;

      if (!hadFocus) {
        editor.focus({ preventScroll: true });
      }

      editor.setSelectionRange(start, end);
      action();

      requestAnimationFrame(() => {
        editor.focus({ preventScroll: true });
        const safeStart = Math.min(start, editor.value.length);
        const safeEnd = Math.min(end, editor.value.length);
        editor.setSelectionRange(safeStart, safeEnd);
        editor.scrollTop = scrollTop;
      });
    }

    function fireHistoryShortcut(kind) {
      const isMac = /Mac|iPhone|iPad/i.test(navigator.platform) || /Mac OS X/i.test(navigator.userAgent);
      const key = kind === 'undo' ? 'z' : 'y';
      const eventInit = {
        key,
        code: `Key${key.toUpperCase()}`,
        keyCode: key.toUpperCase().charCodeAt(0),
        which: key.toUpperCase().charCodeAt(0),
        bubbles: true,
        cancelable: true,
        composed: true,
        ctrlKey: !isMac,
        metaKey: isMac
      };

      const down = new KeyboardEvent('keydown', eventInit);
      editor.dispatchEvent(down);

      try {
        if (kind === 'undo') {
          document.execCommand('undo');
        } else {
          document.execCommand('redo');
        }
      } catch (error) {
        console.error(error);
      }

      const up = new KeyboardEvent('keyup', eventInit);
      editor.dispatchEvent(up);

      scheduleSave();
    }

    function setupHistoryButton(button, kind) {
      button.addEventListener('pointerdown', (event) => {
        event.preventDefault();
      });

      button.addEventListener('mousedown', (event) => {
        event.preventDefault();
      });

      button.addEventListener('touchstart', (event) => {
        event.preventDefault();
      }, { passive: false });

      button.addEventListener('click', (event) => {
        event.preventDefault();
        keepKeyboardStable(() => fireHistoryShortcut(kind));
      });
    }

    editor.addEventListener('input', scheduleSave);
    editor.addEventListener('scroll', scheduleSave, { passive: true });
    editor.addEventListener('keyup', scheduleSave);
    editor.addEventListener('click', scheduleSave);
    window.addEventListener('beforeunload', saveState);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        saveState();
      }
    });

    setupHistoryButton(undoBtn, 'undo');
    setupHistoryButton(redoBtn, 'redo');

    restoreState().then(() => {
      editor.focus({ preventScroll: true });
      const len = editor.value.length;
      editor.setSelectionRange(len, len);
    });
  </script>
</body>
</html>
