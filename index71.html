<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>URL Share</title>
  <meta name="description" content="URL共有用リンクの作成、アクセス、QRコード表示ができるシンプルなサイトです。">

    <!-- 参考サイトと同系統の、対応ブラウザが広いQRライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    @layer base, make1, make2, make3, make4;

    @layer base {
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Noto Sans JP", sans-serif;
        --bg: #f3f4f6;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #d1d5db;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #7ab5fc;
        --success: #15803d;
        --shadow: 0 16px 40px rgb(15 23 42 / 12%);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background:
          radial-gradient(circle at top left, rgb(37 99 235 / 12%), transparent 32rem),
          var(--bg);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --panel: #111827;
          --text: #f9fafb;
          --muted: #9ca3af;
          --line: #374151;
          --primary: #60a5fa;
          --primary-hover: #93c5fd;
          --danger: #7ab5fc;
          --success: #4ade80;
          --shadow: 0 16px 40px rgb(0 0 0 / 35%);
        }
      }
    }

    @layer make1 {
      /* レイアウト */
      .page {
        width: min(100% - 32px, 720px);
        margin-inline: auto;
        padding-block: 48px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand__mark {
        display: grid;
        place-items: center;
        width: 44px;
        aspect-ratio: 1;
        border-radius: 14px;
        background: var(--primary);
        color: white;
        font-size: 22px;
        box-shadow: var(--shadow);
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.4rem, 4vw, 2rem);
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .panel {
        padding: clamp(20px, 5vw, 32px);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--panel) 94%, transparent);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .button-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .option-list {
        display: grid;
        gap: 10px;
      }

      .option-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: color-mix(in srgb, var(--bg) 55%, var(--panel));
      }

      .option-item input {
        width: 18px;
        height: 18px;
        margin: 0;
      }

      @media (max-width: 620px) {
        .page {
          padding-block: 24px;
        }

        .button-grid,
        .button-row {
          grid-template-columns: 1fr;
        }
      }
    }

    @layer make2 {
      /* フォーム・ボタン */
      .label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .input {
        width: 100%;
        min-height: 52px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 18%, transparent);
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 16px;
        border: 1px solid transparent;
        border-radius: 12px;
        font-weight: 750;
        text-decoration: none;
        transition: transform 0.15s, background 0.2s, border-color 0.2s;
      }

      .button:active {
        transform: translateY(1px);
      }

      .button--primary {
        background: var(--primary);
        color: white;
      }

      .button--primary:hover {
        background: var(--primary-hover);
      }

      .button--secondary {
        border-color: var(--line);
        background: var(--panel);
        color: var(--text);
      }

      .button--secondary:hover {
        border-color: var(--primary);
      }

      .button--danger {
        background: var(--danger);
        color: white;
      }

      .helper,
      .status {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .status[data-kind="success"] {
        color: var(--success);
      }

      .status[data-kind="error"] {
        color: var(--danger);
      }
    }

    @layer make3 {
      /* 共有画面・QR表示・読み取り案内 */
      .target-box {
        overflow-wrap: anywhere;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: color-mix(in srgb, var(--bg) 75%, var(--panel));
        line-height: 1.7;
      }

      .link-button {
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--primary);
        text-decoration: underline;
        overflow-wrap: anywhere;
      }

      .qr-box {
        display: grid;
        place-items: center;
        min-height: 310px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: white;
      }

      #qrCode img,
      #qrCode canvas {
        display: block;
        max-width: 100%;
        height: auto;
      }

      .divider {
        height: 1px;
        margin-block: 4px;
        background: var(--line);
      }

      .tiny {
        font-size: 0.84rem;
      }

      /* hidden属性は後段レイヤーで必ず表示指定より優先します。 */
      [hidden] {
        display: none;
      }
    }

    @layer make4 {
      /* 共有画面の2段ボタン配置 */
      .action-rows {
        display: grid;
        gap: 12px;
      }

      /* 1項目でも非表示なら、段の区切りをなくして詰めて配置します。 */
      .action-rows--compact {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .action-rows--compact .button-row {
        display: contents;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="brand">
      <div class="brand__mark" aria-hidden="true">↗</div>
      <div>
        <h1>URL Share</h1>
        <p>URLを共有リンクに変換します。</p>
      </div>
    </header>

    <!-- クエリパラメータなし -->
    <section id="createView" class="panel stack" hidden>
      <div>
        <label class="label" for="urlInput">共有するURL</label>
        <input
          id="urlInput"
          class="input"
          type="url"
          inputmode="url"
          autocomplete="url"
          placeholder="https://example.com/path"
        >
      </div>

      <fieldset class="stack">
        <legend class="label">共有画面から外す項目</legend>
        <div class="option-list">
          <label class="option-item">
            <input id="hideCacheOption" type="checkbox">
            <span>キャッシュ回避アクセス</span>
          </label>
          <label class="option-item">
            <input id="hideWaybackOption" type="checkbox">
            <span>Web Archiveで開く</span>
          </label>
          <label class="option-item">
            <input id="hideQrOption" type="checkbox">
            <span>このURLのQRコードを表示</span>
          </label>
        </div>
      </fieldset>

      <button id="copyShareUrlButton" class="button button--primary" type="button">
        共有用URLをコピー
      </button>

      <p class="helper">
        入力したURLの <code>https://</code> 以降を、現在のサイトの
        <code>?url=</code> に格納します。
      </p>

      <p id="createStatus" class="status" role="status" aria-live="polite"></p>
    </section>

    <!-- クエリパラメータあり -->
    <section id="shareView" class="panel stack" hidden>
      <div>
        <span class="label">共有されたURL</span>
        <div id="targetUrlText" class="target-box"></div>
      </div>

      <div class="action-rows">
        <div class="button-row">
          <a id="openUrlButton" class="button button--primary" href="#" target="_blank" rel="noopener noreferrer">
            アクセスする
          </a>
          <button id="openWithoutCacheButton" class="button button--danger" type="button">
            キャッシュ回避アクセス
          </button>
        </div>

        <div class="button-row">
          <button id="openWaybackButton" class="button button--secondary" type="button">
            Web Archiveで開く
          </button>
          <button id="showQrButton" class="button button--secondary" type="button">
            このURLのQRコードを表示
          </button>
        </div>
      </div>

      <section id="qrSection" class="stack" hidden>
        <div class="divider"></div>
        <div class="qr-box">
          <div id="qrCode" role="img" aria-label="共有URLのQRコード"></div>
        </div>

        <p class="helper tiny">
          QRコードは <a href="https://x.gd/1JQYm" target="_blank" rel="noopener noreferrer">x.gd/1JQYm</a> にアクセスし、表示された読み取りサイトから読み取れます。環境によっては先頭に <code>https://</code> が必要です。
        </p>
      </section>

      <p id="shareStatus" class="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const createView = document.querySelector("#createView");
    const shareView = document.querySelector("#shareView");
    const urlInput = document.querySelector("#urlInput");
    const copyShareUrlButton = document.querySelector("#copyShareUrlButton");
    const createStatus = document.querySelector("#createStatus");
    const hideCacheOption = document.querySelector("#hideCacheOption");
    const hideWaybackOption = document.querySelector("#hideWaybackOption");
    const hideQrOption = document.querySelector("#hideQrOption");

    const targetUrlText = document.querySelector("#targetUrlText");
    const openUrlButton = document.querySelector("#openUrlButton");
    const showQrButton = document.querySelector("#showQrButton");
    const openWithoutCacheButton = document.querySelector("#openWithoutCacheButton");
    const openWaybackButton = document.querySelector("#openWaybackButton");
    const qrSection = document.querySelector("#qrSection");
    const qrCode = document.querySelector("#qrCode");
    const shareStatus = document.querySelector("#shareStatus");
    const actionRows = document.querySelector(".action-rows");

    const SETTINGS_DB_NAME = "url-share-settings";
    const SETTINGS_STORE_NAME = "preferences";
    const SETTINGS_KEY = "hidden-actions";

    function openSettingsDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(SETTINGS_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(SETTINGS_STORE_NAME)) {
            db.createObjectStore(SETTINGS_STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function loadHiddenActionSettings() {
      const db = await openSettingsDb();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(SETTINGS_STORE_NAME, "readonly");
        const request = transaction.objectStore(SETTINGS_STORE_NAME).get(SETTINGS_KEY);
        request.onsuccess = () => resolve(request.result || {});
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => db.close();
      });
    }

    async function saveHiddenActionSettings() {
      const settings = {
        cache: hideCacheOption.checked,
        wayback: hideWaybackOption.checked,
        qr: hideQrOption.checked
      };
      const db = await openSettingsDb();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(SETTINGS_STORE_NAME, "readwrite");
        transaction.objectStore(SETTINGS_STORE_NAME).put(settings, SETTINGS_KEY);
        transaction.oncomplete = () => {
          db.close();
          resolve();
        };
        transaction.onerror = () => reject(transaction.error);
      });
    }

    async function restoreHiddenActionSettings() {
      try {
        const settings = await loadHiddenActionSettings();
        hideCacheOption.checked = Boolean(settings.cache);
        hideWaybackOption.checked = Boolean(settings.wayback);
        hideQrOption.checked = Boolean(settings.qr);
      } catch {
        // IndexedDBを利用できない環境では、既定値のまま続行します。
      }
    }

    function setStatus(element, message, kind = "") {
      element.textContent = message;
      element.dataset.kind = kind;
    }

    function normalizeHttpsUrl(rawValue) {
      const trimmed = rawValue.trim();

      if (!trimmed) {
        throw new Error("URLを入力してください。");
      }

      const withProtocol = /^https:\/\//i.test(trimmed)
        ? trimmed
        : `https://${trimmed.replace(/^\/+/, "")}`;

      const parsed = new URL(withProtocol);

      if (parsed.protocol !== "https:") {
        throw new Error("HTTPSのURLのみ利用できます。");
      }

      return parsed.href;
    }

    function createShareUrl(targetUrl) {
      const payload = targetUrl.replace(/^https:\/\//i, "");
      const shareUrl = new URL(window.location.href);
      shareUrl.search = "";
      shareUrl.hash = "";
      shareUrl.searchParams.set("url", payload);

      if (hideCacheOption.checked) shareUrl.searchParams.set("hideCache", "1");
      if (hideWaybackOption.checked) shareUrl.searchParams.set("hideArchive", "1");
      if (hideQrOption.checked) shareUrl.searchParams.set("hideQr", "1");

      return shareUrl.href;
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.opacity = "0";
      document.body.append(area);
      area.select();
      const copied = document.execCommand("copy");
      area.remove();

      if (!copied) {
        throw new Error("クリップボードへのコピーに失敗しました。");
      }
    }

    async function handleCreateShareUrl() {
      try {
        const targetUrl = normalizeHttpsUrl(urlInput.value);
        await saveHiddenActionSettings().catch(() => {});
        const shareUrl = createShareUrl(targetUrl);
        await copyText(shareUrl);
        setStatus(createStatus, "共有用URLをコピーしました。", "success");
      } catch (error) {
        setStatus(createStatus, error.message || "処理に失敗しました。", "error");
      }
    }

    function showQrCode(targetUrl) {
      try {
        if (typeof QRCode !== "function") {
          throw new Error("QRコード生成ライブラリを読み込めませんでした。");
        }

        qrCode.replaceChildren();
        new QRCode(qrCode, {
          text: targetUrl,
          width: 280,
          height: 280,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });

        qrSection.hidden = false;
        showQrButton.textContent = "QRコードを隠す";
        setStatus(shareStatus, "");
      } catch (error) {
        setStatus(shareStatus, error.message || "QRコードを生成できませんでした。", "error");
      }
    }

    function hideQrCode() {
      qrSection.hidden = true;
      showQrButton.textContent = "このURLのQRコードを表示";
    }

    function createCacheBustingUrl(targetUrl) {
      const url = new URL(targetUrl);

      // 既存パラメータを維持したまま、毎回異なる値を追加します。
      url.searchParams.set("_cache_bust", Date.now().toString());

      return url.href;
    }

    function createWaybackUrl(targetUrl) {
      return `https://web.archive.org/web/*/${targetUrl}`;
    }

    async function initialize() {
      const params = new URLSearchParams(window.location.search);
      const hasUrlParameter = params.has("url");
      const payload = params.get("url");
      const hideCache = params.get("hideCache") === "1";
      const hideArchive = params.get("hideArchive") === "1";
      const hideQr = params.get("hideQr") === "1";

      // クエリパラメータなし:
      // 「共有するURL」パネルのみ表示します。
      if (!hasUrlParameter) {
        createView.hidden = false;
        shareView.hidden = true;
        await restoreHiddenActionSettings();
        return;
      }

      // クエリパラメータあり:
      // 「共有されたURL」パネルのみ表示します。
      createView.hidden = true;
      shareView.hidden = false;

      try {
        const targetUrl = normalizeHttpsUrl(payload ?? "");
        targetUrlText.textContent = targetUrl;
        openUrlButton.href = targetUrl;

        openWithoutCacheButton.hidden = hideCache;
        openWaybackButton.hidden = hideArchive;
        showQrButton.hidden = hideQr;

        if (hideCache || hideArchive || hideQr) {
          actionRows.classList.add("action-rows--compact");
        }

        openWithoutCacheButton.addEventListener("click", () => {
          const cacheBustingUrl = createCacheBustingUrl(targetUrl);
          window.open(cacheBustingUrl, "_blank", "noopener,noreferrer");
        });

        openWaybackButton.addEventListener("click", () => {
          window.open(createWaybackUrl(targetUrl), "_blank", "noopener,noreferrer");
        });

        showQrButton.addEventListener("click", () => {
          if (qrSection.hidden) {
            showQrCode(targetUrl);
          } else {
            hideQrCode();
          }
        });
      } catch {
  targetUrlText.textContent = "共有URLのクエリパラメータが不正です。";
  openUrlButton.hidden = true;
  showQrButton.hidden = true;
  openWithoutCacheButton.hidden = true;
  openWaybackButton.hidden = true;
  setStatus(
    shareStatus,
    "有効なHTTPS URLではありません。",
    "error"
  );
      }
    }

    [hideCacheOption, hideWaybackOption, hideQrOption].forEach((checkbox) => {
      checkbox.addEventListener("change", () => {
        saveHiddenActionSettings().catch(() => {});
      });
    });

    copyShareUrlButton.addEventListener("click", handleCreateShareUrl);
    urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleCreateShareUrl();
      }
    });


    initialize();
  </script>
</body>
</html>
