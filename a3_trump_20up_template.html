<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A3 トランプ 20枚配置 印刷テンプレート</title>
  <style>
    @page {
      size: A3 portrait;
      margin: 0;
    }

    :root {
      --page-w: 297mm;
      --page-h: 420mm;
      --card-w-v: 63mm;
      --card-h-v: 88mm;
      --card-w-h: 88mm;
      --card-h-h: 63mm;
      --stroke: 0.25mm;
      --safe-stroke: 0.15mm;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #e9e9e9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .screen-note {
      max-width: 980px;
      margin: 16px auto;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      line-height: 1.6;
      font-size: 14px;
    }

    .page-wrap {
      display: flex;
      justify-content: center;
      padding: 12px 0 24px;
    }

    .sheet {
      width: var(--page-w);
      height: var(--page-h);
      background: white;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card-cut {
      fill: none;
      stroke: #000;
      stroke-width: var(--stroke);
      vector-effect: non-scaling-stroke;
    }

    .safe {
      fill: none;
      stroke: #888;
      stroke-width: var(--safe-stroke);
      stroke-dasharray: 1.5 1.5;
      vector-effect: non-scaling-stroke;
    }

    .label {
      font-size: 4.2px;
      fill: #444;
      user-select: none;
    }

    .title {
      font-size: 5px;
      fill: #111;
      font-weight: 600;
    }

    .guide {
      stroke: #bbb;
      stroke-width: 0.2mm;
      stroke-dasharray: 1 2;
      vector-effect: non-scaling-stroke;
    }

    .card-face {
      fill: #fff;
    }

    @media print {
      body { background: #fff; }
      .screen-note { display: none; }
      .page-wrap { padding: 0; }
      .sheet { box-shadow: none; }
    }
  </style>
</head>
