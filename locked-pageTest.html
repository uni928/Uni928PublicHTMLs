  function fromBase64(value) {
    return Uint8Array.from(atob(value), function(char) { return char.charCodeAt(0); });

  function byteIndexOf(haystack, needle) {
    outer: for (let i = 0; i <= haystack.length - needle.length; i++) {

  async function readTailKey() {
    /* 軽い難読化用です。curl / wget / Raw保存 / ネットワーク取得では末尾データも残る可能性があり、完全な秘匿ではありません。 */
    const begin = new TextEncoder().encode('A9TAIL_BEGIN');
    const end = new TextEncoder().encode('A9TAIL_END');
    let bytes = null;
    try {
      const res = await fetch(location.href, { cache: 'no-store' });
      bytes = new Uint8Array(await res.arrayBuffer());
      const start = byteIndexOf(bytes, begin);
      if (start < 0) return '';
      const keyStart = start + begin.length;
      const tail = bytes.subarray(keyStart);

    for (let i = 0; i < bytes.length; i++) out[i] = bytes[i] ^ keyBytes[i % keyBytes.length];

    out.fill(0);
